<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Forzada de Miembros - Admin Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
        }
        .status.loading {
            background: #fef3cd;
            color: #856404;
            border: 1px solid #fde68a;
        }
        .status.success {
            background: #d1edff;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .button {
            background: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s;
            margin: 0.5rem;
        }
        .button:hover {
            background: #0056b3;
        }
        .button.secondary {
            background: #6c757d;
        }
        .button.secondary:hover {
            background: #545b62;
        }
        .hidden {
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Recarga Forzada de Miembros</h1>
        <p>Esta herramienta invalidará el caché y forzará la recarga de datos en el dashboard de admin.</p>
        
        <div id="status" class="status loading hidden">
            <div class="spinner"></div>
            Procesando...
        </div>
        
        <div id="result" class="status success hidden">
            ✅ Recarga completada exitosamente
        </div>
        
        <div id="actions">
            <button class="button" onclick="forceRefresh()">
                🔄 Forzar Recarga Ahora
            </button>
            <button class="button secondary" onclick="goToDashboard()">
                🏠 Ir a Dashboard
            </button>
        </div>
        
        <div id="progress" class="hidden">
            <p>1. Invalidando caché de Memberstack...</p>
            <p>2. Recargando página...</p>
        </div>
    </div>

    <script>
        function forceRefresh() {
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const actions = document.getElementById('actions');
            const progress = document.getElementById('progress');
            
            // Mostrar estado de carga
            status.classList.remove('hidden');
            actions.classList.add('hidden');
            progress.classList.remove('hidden');
            
            // Simular progreso
            setTimeout(() => {
                // Invalidar caché si el objeto está disponible
                if (window.memberstackAdmin) {
                    try {
                        window.memberstackAdmin.invalidateCache();
                        console.log('✅ Caché de Memberstack invalidado');
                    } catch (error) {
                        console.error('❌ Error al invalidar caché:', error);
                    }
                }
            }, 500);
            
            // Recargar la página después del proceso
            setTimeout(() => {
                status.classList.add('hidden');
                result.classList.remove('hidden');
                progress.classList.add('hidden');
                
                // Redirigir al dashboard después de 2 segundos
                setTimeout(() => {
                    goToDashboard();
                }, 2000);
            }, 1500);
        }
        
        function goToDashboard() {
            window.location.href = '/admin/dashboard';
        }
        
        // Auto-ejecutar al cargar la página
        window.addEventListener('load', () => {
            console.log('🚀 Página de recarga forzada lista');
        });
    </script>
</body>
</html>
