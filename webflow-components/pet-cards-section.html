<!--
  🐾 Club Pata Amiga — Pet Cards Section Widget
  Embeddable in Webflow. Shows pet cards + add pet modal.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap');

/* ===== CONTAINER ===== */
.pata-pets-section { max-width: 960px; margin: 0 auto; padding: 20px; font-family: 'Outfit', sans-serif; background: transparent; }
.pata-pets-grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }

/* ===== PET CARD ===== */
.pata-pet-card {
  background: #FFFFFF; border-radius: 35px; padding: 21px; display: flex; gap: 28px;
  align-items: center; width: 100%; max-width: 580px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.06); transition: transform 0.3s, box-shadow 0.3s;
}
.pata-pet-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }

.pata-pet-photo-wrap {
  width: 220px; height: 220px; min-width: 220px; background: #15BEB2;
  border-radius: 30px; overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.pata-pet-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.pata-pet-photo-placeholder { font-size: 80px; }

.pata-pet-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.pata-pet-name { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 40px; color: #15BEB2; line-height: 1.1; margin: 0; }

.pata-pet-details { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 3px; }
.pata-pet-details li { display: flex; align-items: center; gap: 9px; font-size: 14px; color: #1A1A1A; }
.pata-pet-details li::before { content: ''; width: 5px; height: 5px; background: #181616; border-radius: 50%; flex-shrink: 0; }

.pata-pet-status { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.pata-status-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
.pata-status-item.active { color: #9FD406; }
.pata-status-item.pending { color: #FFA500; }
.pata-status-icon { width: 16px; height: 16px; flex-shrink: 0; }

.pata-pet-date { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #1A1A1A; margin-top: 2px; }
.pata-date-icon { width: 18px; height: 18px; opacity: 0.7; }

.pata-btn-historial {
  display: inline-flex; align-items: center; gap: 10px; background: #9FD406;
  color: #000; border: none; border-radius: 50px; padding: 10px 18px;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px;
  cursor: pointer; transition: all 0.3s; margin-top: 6px; width: fit-content;
}
.pata-btn-historial:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(159,212,6,0.3); }

/* ===== ADD PET CARD ===== */
.pata-add-card {
  background: #FFFFFF; border: 2px dashed #000; border-radius: 35px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; max-width: 580px; min-height: 264px; cursor: pointer;
  transition: all 0.3s; padding: 30px;
}
.pata-add-card:hover { border-color: #FF0063; background: #FFF5F9; transform: translateY(-4px); }

.pata-add-icon {
  width: 89px; height: 89px; border: 5px solid #FF0063; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 16px;
}
.pata-add-icon::before, .pata-add-icon::after {
  content: ''; position: absolute; background: #FF0063; border-radius: 50px;
}
.pata-add-icon::before { width: 4px; height: 33px; }
.pata-add-icon::after { width: 33px; height: 4px; }

.pata-add-text { font-size: 20px; font-weight: 400; color: #000; margin: 0; }
.pata-add-subtext { font-size: 12px; color: #000; opacity: 0.4; margin-top: 12px; }

/* ===== LOADING ===== */
.pata-loading { text-align: center; padding: 60px 20px; color: #888; font-size: 16px; font-weight: 600; }
.pata-spinner { width: 40px; height: 40px; border: 4px solid #E0E0E0; border-top-color: #15BEB2; border-radius: 50%; animation: pataSpin 0.8s linear infinite; margin: 0 auto 15px; }
@keyframes pataSpin { to { transform: rotate(360deg); } }

/* ===== MODAL OVERLAY ===== */
.pata-modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center;
  z-index: 10000; backdrop-filter: blur(5px);
}
.pata-modal-overlay.show { display: flex; }

.pata-modal-box {
  background: #FFF; width: 94%; max-width: 560px; border-radius: 30px;
  overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: pataSlideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto;
}
@keyframes pataSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.pata-modal-head {
  padding: 24px 28px; background: #F8FBFF; border-bottom: 1px solid #E0E0E0;
  display: flex; justify-content: space-between; align-items: center;
}
.pata-modal-head h3 { font-size: 20px; font-weight: 900; color: #1A1A1A; margin: 0; }
.pata-modal-close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #A0A0A0; line-height: 1; }
.pata-modal-close-btn:hover { color: #000; }

.pata-modal-body { padding: 28px; }

/* ===== FORM FIELDS ===== */
.pata-form-group { margin-bottom: 18px; }
.pata-form-label { display: block; font-size: 14px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px; }
.pata-form-label .req { color: #E53E3E; }

.pata-form-input, .pata-form-select {
  width: 100%; padding: 12px 18px; border: 2px solid #E0E0E0; border-radius: 50px;
  font-family: 'Outfit', sans-serif; font-size: 14px; color: #1A1A1A;
  outline: none; transition: border-color 0.3s; box-sizing: border-box;
}
.pata-form-input:focus, .pata-form-select:focus { border-color: #15BEB2; }
.pata-form-input.error, .pata-form-select.error { border-color: #E53E3E; }
.pata-form-error { font-size: 12px; color: #E53E3E; margin-top: 4px; }

.pata-form-textarea {
  width: 100%; padding: 14px 18px; border: 2px solid #E0E0E0; border-radius: 20px;
  font-family: 'Outfit', sans-serif; font-size: 14px; resize: vertical; min-height: 70px;
  outline: none; box-sizing: border-box;
}
.pata-form-textarea:focus { border-color: #15BEB2; }

/* Pet Type Selector */
.pata-type-sel { display: flex; gap: 12px; }
.pata-type-btn {
  flex: 1; padding: 16px; border: 2px solid #E0E0E0; border-radius: 20px;
  background: #FFF; cursor: pointer; text-align: center; transition: all 0.3s;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; color: #1A1A1A;
}
.pata-type-btn:hover { border-color: #15BEB2; }
.pata-type-btn.active { border-color: #15BEB2; background: #E8FAF9; }
.pata-type-btn .pata-type-icon { font-size: 32px; display: block; margin-bottom: 6px; }

/* Age Input */
.pata-age-row { display: flex; gap: 10px; }
.pata-age-row .pata-form-input { flex: 1; }
.pata-age-row .pata-form-select { width: 130px; flex-shrink: 0; }

/* Breed Switch */
.pata-breed-switch { display: flex; gap: 0; border: 2px solid #E0E0E0; border-radius: 50px; overflow: hidden; }
.pata-switch-btn {
  flex: 1; padding: 10px 20px; border: none; background: #FFF; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; color: #888; transition: all 0.3s;
}
.pata-switch-btn.active { background: #15BEB2; color: #FFF; }

/* Autocomplete */
.pata-ac-wrap { position: relative; }
.pata-ac-list {
  position: absolute; top: 100%; left: 0; right: 0; background: #FFF;
  border: 1px solid #E0E0E0; border-radius: 16px; max-height: 200px; overflow-y: auto;
  z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-top: 4px; display: none;
}
.pata-ac-list.show { display: block; }
.pata-ac-item {
  padding: 10px 18px; cursor: pointer; font-size: 14px; transition: background 0.15s;
}
.pata-ac-item:hover, .pata-ac-item.active { background: #E8FAF9; }

/* Photo Upload */
.pata-upload-box {
  border: 2px dashed #E0E0E0; border-radius: 20px; padding: 24px; text-align: center;
  cursor: pointer; transition: all 0.3s; background: #F8FBFF; position: relative; overflow: hidden;
}
.pata-upload-box:hover { border-color: #15BEB2; background: #F0FEFE; }
.pata-upload-box.has-file { border-style: solid; border-color: #9FD406; background: #F6FFF6; }
.pata-upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.pata-upload-icon { font-size: 28px; margin-bottom: 6px; }
.pata-upload-text { font-size: 13px; font-weight: 600; color: #666; }
.pata-upload-preview { width: 100%; max-height: 150px; object-fit: contain; border-radius: 12px; margin-top: 8px; }

/* Checkbox */
.pata-checkbox-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.pata-checkbox-row input { width: 20px; height: 20px; accent-color: #15BEB2; cursor: pointer; }
.pata-checkbox-row label { font-size: 14px; font-weight: 600; cursor: pointer; }

/* Form Row */
.pata-form-row { display: flex; gap: 14px; }
.pata-form-row > .pata-form-group { flex: 1; }

/* Step Indicator */
.pata-step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.pata-step-dot { width: 10px; height: 10px; border-radius: 50%; background: #E0E0E0; transition: background 0.3s; }
.pata-step-dot.active { background: #15BEB2; width: 30px; border-radius: 10px; }
.pata-step-label { font-size: 13px; font-weight: 600; color: #888; }

/* Alert Box */
.pata-alert-box {
  background: #FFF9E6; border-left: 4px solid #FFA500; border-radius: 12px;
  padding: 16px; margin-bottom: 18px; display: flex; gap: 12px; align-items: flex-start;
}
.pata-alert-box .alert-icon { font-size: 22px; flex-shrink: 0; }
.pata-alert-box .alert-text { font-size: 13px; color: #444; line-height: 1.4; }
.pata-alert-box .alert-text strong { display: block; margin-bottom: 4px; font-size: 14px; }

/* Buttons */
.pata-btn-row { display: flex; gap: 12px; margin-top: 24px; }
.pata-btn-primary {
  flex: 1; padding: 14px 24px; background: #FE8F15; color: #FFF; border: 2px solid #000;
  border-radius: 50px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px;
  cursor: pointer; transition: all 0.3s;
}
.pata-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(254,143,21,0.3); }
.pata-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.pata-btn-secondary {
  padding: 14px 24px; background: #00BBB4; color: #FFF; border: 2px solid #000;
  border-radius: 50px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px;
  cursor: pointer; transition: all 0.3s;
}
.pata-btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,187,180,0.3); }

/* Detail Modal */
.pata-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pata-detail-item { margin-bottom: 10px; }
.pata-detail-label { font-size: 12px; font-weight: 700; color: #A0A0A0; text-transform: uppercase; margin-bottom: 3px; }
.pata-detail-value { font-size: 15px; font-weight: 700; color: #1A1A1A; }
.pata-detail-photo { width: 100%; border-radius: 20px; margin-bottom: 16px; max-height: 200px; object-fit: cover; }

/* Toast */
.pata-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
  padding: 14px 28px; border-radius: 50px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 700; color: #FFF; z-index: 10001;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.pata-toast.show { transform: translateX(-50%) translateY(0); }
.pata-toast.success { background: #38A169; }
.pata-toast.error { background: #E53E3E; }
.pata-toast.warning { background: #DD6B20; }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .pata-pet-card { flex-direction: column; gap: 16px; padding: 16px; max-width: 100%; }
  .pata-pet-photo-wrap { width: 100%; height: 200px; min-width: unset; }
  .pata-pet-name { font-size: 30px; }
  .pata-add-card { min-height: 200px; max-width: 100%; }
  .pata-form-row { flex-direction: column; gap: 0; }
  .pata-age-row { flex-direction: row; }
  .pata-detail-grid { grid-template-columns: 1fr; }
  .pata-btn-row { flex-direction: column; }
}
</style>

<div id="pata-pets-container" class="pata-pets-section">
  <div class="pata-loading" id="pata-pets-loading">
    <div class="pata-spinner"></div>
    Cargando tus peludos...
  </div>
  <div class="pata-pets-grid" id="pata-pets-grid" style="display:none;"></div>
</div>

<!-- Modal Overlay (Add Pet + Detail) -->
<div class="pata-modal-overlay" id="pata-modal-overlay">
  <div class="pata-modal-box" id="pata-modal-content"></div>
</div>

<!-- Toast -->
<div class="pata-toast" id="pata-toast"></div>

<script>
/* ===================================================================
   🐾 PetCardsWidget — Main Widget Class
   =================================================================== */
(function() {
  'use strict';

  const API_URL = window.PATA_AMIGA_CONFIG?.apiUrl || 'https://app.pataamiga.mx';
  const MAX_PETS = 3;

  // ── Breed lists (embedded for offline widget) ──
  const DOG_BREEDS = ['Labrador Retriever','Pastor Alemán','Golden Retriever','Bulldog Francés','Beagle','Poodle','Chihuahua','Pitbull','Boxer','Dachshund','Yorkshire Terrier','Shih Tzu','Rottweiler','Schnauzer','Pug','Border Collie','Husky Siberiano','Chow Chow','Doberman','Jack Russell Terrier','Cocker Spaniel','Maltés','Bichón Frisé','Gran Danés','San Bernardo','Akita Inu','Samoyedo','Dálmata','Basset Hound','Weimaraner','Mestizo'];
  const CAT_BREEDS = ['Siamés','Persa','Maine Coon','Ragdoll','Bengalí','Sphynx','Abisinio','Birmano','Oriental','Americano de Pelo Corto','British Shorthair','Scottish Fold','Devon Rex','Cornish Rex','Siberiano','Angora Turco','Noruego del Bosque','Bombay','Burmés','Mestizo'];
  const DOG_COLORS = ['Arena','Atigrado','Azul','Bicolor','Blanco','Canela','Chocolate','Crema','Dorado','Gris','Manchado','Marrón','Merle','Negro','Otro','Plateado','Rojo','Sable','Tricolor'];
  const CAT_COLORS = ['Atigrado','Bicolor','Blanco','Calicó','Carey','Chocolate','Crema','Gris','Manchado','Marrón','Naranja','Negro','Otro','Smoke','Tricolor'];

  class PetCardsWidget {
    constructor() {
      this.member = null;
      this.pets = [];
      this.grid = document.getElementById('pata-pets-grid');
      this.loading = document.getElementById('pata-pets-loading');
      this.overlay = document.getElementById('pata-modal-overlay');
      this.modalContent = document.getElementById('pata-modal-content');
      this.toastEl = document.getElementById('pata-toast');
      this.addFormData = {};
      this.addStep = 1;
      this.uploadedPhotoUrl = null;
      this.uploadedVetUrl = null;
      this.init();
    }

    async init() {
      try {
        await this.waitForMemberstack();
        if (!this.member) { this.loading.textContent = 'Inicia sesión para ver tus mascotas.'; return; }
        await this.loadPets();
        this.render();
      } catch (e) {
        console.error('❌ PetCards error:', e);
        this.loading.innerHTML = '<span style="color:#E53E3E;">Error cargando mascotas</span>';
      }
    }

    waitForMemberstack() {
      return new Promise(resolve => {
        let att = 0;
        const iv = setInterval(() => {
          att++;
          if (window.$memberstackDom) {
            clearInterval(iv);
            window.$memberstackDom.getCurrentMember().then(({ data }) => { this.member = data; resolve(); });
          } else if (att > 50) { clearInterval(iv); resolve(); }
        }, 100);
      });
    }

    async loadPets() {
      const res = await fetch(`${API_URL}/api/user/pets?userId=${this.member.id}`);
      const data = await res.json();
      if (data.success) this.pets = data.pets || [];
    }

    // ── Waiting Period ──
    calcCarencia(pet) {
      const now = new Date();
      const start = new Date(pet.created_at);
      let totalDays = 180;
      if (pet.is_adopted || pet.ruac) totalDays = 90;
      else if (pet.is_mixed_breed) totalDays = 120;
      const passed = Math.floor((now - start) / 86400000);
      const remaining = Math.max(0, totalDays - passed);
      const pct = Math.min(100, Math.round((passed / totalDays) * 100));
      return { remaining, pct, totalDays, completed: remaining === 0 };
    }

    // ── Format date ──
    fmtDate(d) {
      const dt = new Date(d);
      const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      return `${dt.getDate()} de ${months[dt.getMonth()]} de ${dt.getFullYear()}`;
    }

    // ── Size label ──
    sizeLabel(s) {
      const map = { 
        'pequeño': 'Tamaño pequeño', 'pequeña': 'Tamaño pequeño', 'small': 'Tamaño pequeño',
        'mediano': 'Tamaño mediano', 'mediana': 'Tamaño mediano', 'medium': 'Tamaño mediano',
        'grande': 'Tamaño grande', 'large': 'Tamaño grande',
        'gigante': 'Tamaño gigante', 'giant': 'Tamaño gigante'
      };
      return map[(s||'').toLowerCase()] || (s ? `Tamaño ${s}` : '');
    }

    ageLabel(pet) {
      const v = pet.age_value || pet.petAge;
      const u = pet.age_unit || pet.petAgeUnit || 'years';
      if (!v) return '';
      return u === 'months' ? `${v} meses de edad` : `${v} ${v == 1 ? 'año' : 'años'} de edad`;
    }

    // ── SVG Icons ──
    checkIcon(color) { return `<svg class="pata-status-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="${color}" stroke-width="1.5"/><path d="M5 8l2 2 4-4" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }
    calendarIcon() { return `<svg class="pata-date-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="14" rx="3" stroke="#888" stroke-width="1.3"/><path d="M2 9h16M7 2v4M13 2v4" stroke="#888" stroke-width="1.3" stroke-linecap="round"/></svg>`; }
    clockIcon(color) { return `<svg class="pata-status-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="${color}" stroke-width="1.5"/><path d="M8 4v4l3 2" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

    // ══════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════
    render() {
      this.loading.style.display = 'none';
      this.grid.style.display = 'flex';
      this.grid.innerHTML = '';

      this.pets.forEach((pet, i) => {
        const c = this.calcCarencia(pet);
        const photoSrc = pet.primary_photo_url || pet.photo_url;
        const card = document.createElement('div');
        card.className = 'pata-pet-card';
        card.innerHTML = `
          <div class="pata-pet-photo-wrap">
            ${photoSrc ? `<img src="${photoSrc}" alt="${pet.name}">` : `<span class="pata-pet-photo-placeholder">${pet.pet_type === 'cat' ? '🐱' : '🐶'}</span>`}
          </div>
          <div class="pata-pet-info">
            <h3 class="pata-pet-name">${pet.name}</h3>
            <ul class="pata-pet-details">
              ${this.sizeLabel(pet.breed_size) ? `<li>${this.sizeLabel(pet.breed_size)}</li>` : ''}
              ${this.ageLabel(pet) ? `<li>${this.ageLabel(pet)}</li>` : ''}
              ${pet.breed ? `<li>${pet.breed}</li>` : ''}
            </ul>
            <div class="pata-pet-status">
              <div class="pata-status-item ${c.completed ? 'active' : 'pending'}">
                ${c.completed ? this.checkIcon('#9FD406') : this.clockIcon('#FFA500')}
                ${c.completed ? 'Carencia cumplida' : `Carencia: ${c.remaining} días restantes`}
              </div>
              <div class="pata-status-item ${c.completed ? 'active' : 'pending'}">
                ${c.completed ? this.checkIcon('#9FD406') : this.clockIcon('#FFA500')}
                ${c.completed ? 'Fondo solidario disponible' : 'Fondo solidario pendiente'}
              </div>
            </div>
            <div class="pata-pet-date">
              ${this.calendarIcon()}
              Registrado el ${this.fmtDate(pet.created_at)}
            </div>
            <button class="pata-btn-historial" data-idx="${i}">Ver historial y beneficios</button>
          </div>`;
        card.querySelector('.pata-btn-historial').addEventListener('click', () => this.showDetailModal(pet));
        this.grid.appendChild(card);
      });

      // Add card
      if (this.pets.length < MAX_PETS) {
        const add = document.createElement('div');
        add.className = 'pata-add-card';
        add.innerHTML = `<div class="pata-add-icon"></div><p class="pata-add-text">Agregar otro peludo</p><span class="pata-add-subtext">Periodo de carencia variable</span>`;
        add.addEventListener('click', () => this.openAddModal());
        this.grid.appendChild(add);
      }
    }

    // ══════════════════════════════════════
    //  DETAIL MODAL
    // ══════════════════════════════════════
    showDetailModal(pet) {
      const c = this.calcCarencia(pet);
      const photoSrc = pet.primary_photo_url || pet.photo_url;
      this.modalContent.innerHTML = `
        <div class="pata-modal-head">
          <h3>Detalles de ${pet.name}</h3>
          <button class="pata-modal-close-btn" id="pata-close-detail">&times;</button>
        </div>
        <div class="pata-modal-body">
          ${photoSrc ? `<img src="${photoSrc}" class="pata-detail-photo" alt="${pet.name}">` : ''}
          <div class="pata-detail-grid">
            <div class="pata-detail-item"><div class="pata-detail-label">Nombre</div><div class="pata-detail-value">${pet.name}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Tipo</div><div class="pata-detail-value">${pet.pet_type === 'cat' ? 'Gato' : 'Perro'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Raza</div><div class="pata-detail-value">${pet.breed || 'No especificada'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Tamaño</div><div class="pata-detail-value">${pet.breed_size || 'No especificado'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Edad</div><div class="pata-detail-value">${this.ageLabel(pet) || 'No especificada'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Sexo</div><div class="pata-detail-value">${pet.gender === 'macho' ? 'Macho' : pet.gender === 'hembra' ? 'Hembra' : 'No especificado'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Color de pelo</div><div class="pata-detail-value">${pet.coat_color || 'No especificado'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Color de ojos</div><div class="pata-detail-value">${pet.eye_color || 'No especificado'}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Registrado</div><div class="pata-detail-value">${this.fmtDate(pet.created_at)}</div></div>
            <div class="pata-detail-item"><div class="pata-detail-label">Estado carencia</div><div class="pata-detail-value" style="color:${c.completed ? '#9FD406' : '#FFA500'};font-weight:900">${c.completed ? '✅ Cumplida' : `⏳ ${c.remaining} días restantes`}</div></div>
            ${pet.is_adopted ? `<div class="pata-detail-item" style="grid-column:1/-1"><div class="pata-detail-label">Historia de adopción</div><div class="pata-detail-value">${pet.adoption_story || 'Sin historia'}</div></div>` : ''}
          </div>
        </div>`;
      this.overlay.classList.add('show');
      document.getElementById('pata-close-detail').addEventListener('click', () => this.closeModal());
      this.overlay.addEventListener('click', (e) => { if (e.target === this.overlay) this.closeModal(); });
    }

    closeModal() { this.overlay.classList.remove('show'); }

    // ══════════════════════════════════════
    //  ADD PET MODAL
    // ══════════════════════════════════════
    openAddModal() {
      this.addStep = 1;
      this.addFormData = { petType: '', name: '', ageValue: '', ageUnit: 'years', gender: '', breedType: 'raza', breed: '', isMixed: false, coatColor: '', noseColor: '', eyeColor: '', isAdopted: false, adoptionStory: '', breedSize: '', ruac: '' };
      this.uploadedPhotoUrl = null;
      this.uploadedVetUrl = null;
      this.renderAddStep();
    }

    renderAddStep() {
      if (this.addStep === 1) this.renderStep1();
      else this.renderStep2();
      this.overlay.classList.add('show');
      this.overlay.onclick = (e) => { if (e.target === this.overlay) this.closeModal(); };
    }

    renderStep1() {
      const d = this.addFormData;
      this.modalContent.innerHTML = `
        <div class="pata-modal-head">
          <h3>🐾 Agregar mascota</h3>
          <button class="pata-modal-close-btn" id="pata-close-add">&times;</button>
        </div>
        <div class="pata-modal-body">
          <div class="pata-step-indicator"><div class="pata-step-dot active"></div><div class="pata-step-dot"></div><span class="pata-step-label">Paso 1 de 2</span></div>
          <div class="pata-form-group">
            <label class="pata-form-label">Tipo de mascota <span class="req">*</span></label>
            <div class="pata-type-sel">
              <button type="button" class="pata-type-btn ${d.petType==='perro'?'active':''}" data-type="perro"><span class="pata-type-icon">🐶</span>Perro</button>
              <button type="button" class="pata-type-btn ${d.petType==='gato'?'active':''}" data-type="gato"><span class="pata-type-icon">🐱</span>Gato</button>
            </div>
            <div class="pata-form-error" id="err-type"></div>
          </div>
          <div class="pata-form-group">
            <label class="pata-form-label">${d.petType==='gato'?'¿Cómo se llama tu michi?':d.petType==='perro'?'¿Cómo se llama tu peludo?':'Nombre'} <span class="req">*</span></label>
            <input class="pata-form-input" id="add-name" value="${d.name}" placeholder="Ej: Luna, Max, Pelusa...">
            <div class="pata-form-error" id="err-name"></div>
          </div>
          <div class="pata-form-group">
            <label class="pata-form-label">Edad <span class="req">*</span></label>
            <div class="pata-age-row">
              <input class="pata-form-input" id="add-age" type="number" min="1" value="${d.ageValue}" placeholder="Ej: 3">
              <select class="pata-form-select" id="add-age-unit"><option value="years" ${d.ageUnit==='years'?'selected':''}>Años</option><option value="months" ${d.ageUnit==='months'?'selected':''}>Meses</option></select>
            </div>
            <div class="pata-form-error" id="err-age"></div>
          </div>
          <div class="pata-btn-row">
            <button class="pata-btn-primary" id="add-next">Continuar →</button>
          </div>
        </div>`;
      // Events
      document.getElementById('pata-close-add').onclick = () => this.closeModal();
      this.modalContent.querySelectorAll('.pata-type-btn').forEach(b => {
        b.onclick = () => {
          d.petType = b.dataset.type;
          this.modalContent.querySelectorAll('.pata-type-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          // Update name label
          const lbl = this.modalContent.querySelector('.pata-form-group:nth-child(3) .pata-form-label');
          if (lbl) lbl.innerHTML = `${d.petType==='gato'?'¿Cómo se llama tu michi?':'¿Cómo se llama tu peludo?'} <span class="req">*</span>`;
        };
      });
      document.getElementById('add-next').onclick = () => {
        d.name = document.getElementById('add-name').value.trim();
        d.ageValue = document.getElementById('add-age').value;
        d.ageUnit = document.getElementById('add-age-unit').value;
        // Validate
        let valid = true;
        if (!d.petType) { document.getElementById('err-type').textContent = 'Selecciona el tipo'; valid = false; }
        if (!d.name) { document.getElementById('err-name').textContent = 'El nombre es requerido'; valid = false; }
        if (!d.ageValue || d.ageValue <= 0) { document.getElementById('err-age').textContent = 'Ingresa la edad'; valid = false; }
        if (valid) { this.addStep = 2; this.renderAddStep(); }
      };
    }

    renderStep2() {
      const d = this.addFormData;
      const isGato = d.petType === 'gato';
      const breeds = isGato ? CAT_BREEDS : DOG_BREEDS;
      const colors = isGato ? CAT_COLORS : DOG_COLORS;
      const ageNum = d.ageUnit === 'years' ? parseInt(d.ageValue) : Math.floor(parseInt(d.ageValue)/12);
      const isSenior = ageNum >= 10;

      this.modalContent.innerHTML = `
        <div class="pata-modal-head">
          <h3>Datos de ${d.name}</h3>
          <button class="pata-modal-close-btn" id="pata-close-add2">&times;</button>
        </div>
        <div class="pata-modal-body">
          <div class="pata-step-indicator"><div class="pata-step-dot"></div><div class="pata-step-dot active"></div><span class="pata-step-label">Paso 2 de 2</span></div>

          <div class="pata-form-group">
            <label class="pata-form-label">Sexo <span class="req">*</span></label>
            <select class="pata-form-select" id="add-gender"><option value="">Selecciona...</option><option value="macho" ${d.gender==='macho'?'selected':''}>Macho</option><option value="hembra" ${d.gender==='hembra'?'selected':''}>Hembra</option></select>
            <div class="pata-form-error" id="err-gender"></div>
          </div>

          <div class="pata-form-group">
            <label class="pata-form-label">Tipo <span class="req">*</span></label>
            <div class="pata-breed-switch">
              <button type="button" class="pata-switch-btn ${d.breedType==='mestizo'?'active':''}" data-bt="mestizo">Mestizo</button>
              <button type="button" class="pata-switch-btn ${d.breedType==='raza'?'active':''}" data-bt="raza">Raza</button>
            </div>
          </div>

          <div class="pata-form-group" id="breed-group" style="display:${d.breedType==='raza'?'block':'none'}">
            <label class="pata-form-label">Raza <span class="req">*</span></label>
            <div class="pata-ac-wrap">
              <input class="pata-form-input" id="add-breed" value="${d.breed}" placeholder="Escribe para buscar..." autocomplete="off">
              <div class="pata-ac-list" id="breed-ac"></div>
            </div>
            <div class="pata-form-error" id="err-breed"></div>
          </div>

          <div class="pata-form-group">
            <label class="pata-form-label">Tamaño</label>
            <select class="pata-form-select" id="add-size">
              <option value="">Selecciona...</option>
              <option value="pequeño" ${d.breedSize==='pequeño'?'selected':''}>Pequeño</option>
              <option value="mediano" ${d.breedSize==='mediano'?'selected':''}>Mediano</option>
              <option value="grande" ${d.breedSize==='grande'?'selected':''}>Grande</option>
              ${!isGato ? `<option value="gigante" ${d.breedSize==='gigante'?'selected':''}>Gigante</option>` : ''}
            </select>
          </div>

          <div class="pata-form-row">
            <div class="pata-form-group">
              <label class="pata-form-label">Color de pelo <span class="req">*</span></label>
              <div class="pata-ac-wrap">
                <input class="pata-form-input" id="add-coat" value="${d.coatColor}" placeholder="Buscar color..." autocomplete="off">
                <div class="pata-ac-list" id="coat-ac"></div>
              </div>
              <div class="pata-form-error" id="err-coat"></div>
            </div>
            <div class="pata-form-group">
              <label class="pata-form-label">Color de nariz</label>
              <div class="pata-ac-wrap">
                <input class="pata-form-input" id="add-nose" value="${d.noseColor}" placeholder="Buscar color..." autocomplete="off">
                <div class="pata-ac-list" id="nose-ac"></div>
              </div>
            </div>
          </div>

          <div class="pata-form-group">
            <label class="pata-form-label">Color de ojos</label>
            <div class="pata-ac-wrap">
              <input class="pata-form-input" id="add-eyes" value="${d.eyeColor}" placeholder="Buscar color..." autocomplete="off">
              <div class="pata-ac-list" id="eyes-ac"></div>
            </div>
          </div>

          <div class="pata-form-group">
            <label class="pata-form-label">Foto principal</label>
            <div class="pata-upload-box" id="photo-box">
              <input type="file" accept="image/jpeg,image/png,image/webp" id="add-photo">
              <span class="pata-upload-icon">📷</span>
              <span class="pata-upload-text">Haz clic para subir foto (JPG/PNG, máx 5MB)</span>
            </div>
          </div>

          <div class="pata-form-group">
            <div class="pata-checkbox-row">
              <input type="checkbox" id="add-adopted" ${d.isAdopted?'checked':''}>
              <label for="add-adopted">¿Es adoptada/rescatada?</label>
            </div>
          </div>
          <div class="pata-form-group" id="adoption-story-group" style="display:${d.isAdopted?'block':'none'}">
            <label class="pata-form-label">Historia de adopción</label>
            <textarea class="pata-form-textarea" id="add-story" placeholder="Cuéntanos la historia...">${d.adoptionStory}</textarea>
          </div>

          <div class="pata-form-group">
            <label class="pata-form-label">RUAC (opcional)</label>
            <input class="pata-form-input" id="add-ruac" value="${d.ruac || ''}" placeholder="Ej: ABC123456789">
            <p class="pata-add-subtext" style="font-size:11px; margin-top:4px;">Si tienes el RUAC, la carencia se reduce a 90 días.</p>
          </div>

          ${isSenior ? `
          <div class="pata-alert-box">
            <span class="alert-icon">⚕️</span>
            <div class="alert-text"><strong>Certificado veterinario requerido</strong>Como ${d.name} tiene ${ageNum} años, necesitarás subir un certificado veterinario.</div>
          </div>
          <div class="pata-form-group">
            <div class="pata-upload-box" id="vet-box">
              <input type="file" accept=".pdf,image/jpeg,image/png" id="add-vet">
              <span class="pata-upload-icon">📄</span>
              <span class="pata-upload-text">Subir certificado (PDF/JPG/PNG, máx 5MB)</span>
            </div>
          </div>` : ''}

          <div class="pata-btn-row">
            <button class="pata-btn-secondary" id="add-back">← Atrás</button>
            <button class="pata-btn-primary" id="add-submit">Registrar mascota ✓</button>
          </div>
        </div>`;

      // Events
      document.getElementById('pata-close-add2').onclick = () => this.closeModal();
      document.getElementById('add-back').onclick = () => { this.saveStep2Fields(); this.addStep = 1; this.renderAddStep(); };

      // Breed switch
      this.modalContent.querySelectorAll('.pata-switch-btn').forEach(b => {
        b.onclick = () => {
          d.breedType = b.dataset.bt;
          this.modalContent.querySelectorAll('.pata-switch-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          const bg = document.getElementById('breed-group');
          if (d.breedType === 'mestizo') { bg.style.display = 'none'; d.isMixed = true; d.breed = 'Mestizo'; }
          else { bg.style.display = 'block'; d.isMixed = false; d.breed = ''; }
        };
      });

      // Autocompletes
      this.setupAutocomplete('add-breed', 'breed-ac', breeds, v => { d.breed = v; });
      this.setupAutocomplete('add-coat', 'coat-ac', colors, v => { d.coatColor = v; });
      this.setupAutocomplete('add-nose', 'nose-ac', colors, v => { d.noseColor = v; });
      this.setupAutocomplete('add-eyes', 'eyes-ac', colors, v => { d.eyeColor = v; });

      // Adopted checkbox
      document.getElementById('add-adopted').onchange = (e) => {
        d.isAdopted = e.target.checked;
        document.getElementById('adoption-story-group').style.display = d.isAdopted ? 'block' : 'none';
      };

      // Photo upload
      const photoInput = document.getElementById('add-photo');
      if (photoInput) {
        photoInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (file.size > 5*1024*1024) { this.toast('La foto no debe superar 5MB', 'error'); return; }
          const box = document.getElementById('photo-box');
          box.innerHTML = '<div class="pata-spinner" style="margin:10px auto;"></div><span class="pata-upload-text">Subiendo...</span>';
          try {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('userId', this.member.id);
            const res = await fetch(`${API_URL}/api/upload/pet-photo`, { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) {
              this.uploadedPhotoUrl = data.url;
              box.className = 'pata-upload-box has-file';
              box.innerHTML = `<img src="${data.url}" class="pata-upload-preview"><span class="pata-upload-text" style="position:relative;z-index:2;background:rgba(255,255,255,.9);padding:4px 10px;border-radius:20px;color:#38A169;font-weight:700;">✓ ${file.name}</span>`;
            } else { this.toast('Error subiendo foto', 'error'); box.innerHTML = '<span class="pata-upload-icon">📷</span><span class="pata-upload-text">Intenta de nuevo</span><input type="file" accept="image/jpeg,image/png,image/webp" id="add-photo">'; }
          } catch(err) { this.toast('Error de conexión', 'error'); }
        };
      }

      // Vet upload
      const vetInput = document.getElementById('add-vet');
      if (vetInput) {
        vetInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (file.size > 5*1024*1024) { this.toast('El archivo no debe superar 5MB', 'error'); return; }
          const box = document.getElementById('vet-box');
          box.innerHTML = '<div class="pata-spinner" style="margin:10px auto;"></div><span class="pata-upload-text">Subiendo...</span>';
          try {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('userId', this.member.id);
            const res = await fetch(`${API_URL}/api/upload/pet-photo`, { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) { this.uploadedVetUrl = data.url; box.className = 'pata-upload-box has-file'; box.innerHTML = `<span class="pata-upload-icon">✓</span><span class="pata-upload-text" style="color:#38A169;font-weight:700;">${file.name}</span>`; }
            else { this.toast('Error subiendo certificado', 'error'); }
          } catch(err) { this.toast('Error de conexión', 'error'); }
        };
      }

      // Submit
      document.getElementById('add-submit').onclick = () => this.submitNewPet(isSenior);
    }

    saveStep2Fields() {
      const d = this.addFormData;
      const el = (id) => document.getElementById(id);
      if (el('add-gender')) d.gender = el('add-gender').value;
      if (el('add-coat')) d.coatColor = el('add-coat').value;
      if (el('add-nose')) d.noseColor = el('add-nose').value;
      if (el('add-eyes')) d.eyeColor = el('add-eyes').value;
      if (el('add-breed')) d.breed = el('add-breed').value;
      if (el('add-size')) d.breedSize = el('add-size').value;
      if (el('add-story')) d.adoptionStory = el('add-story').value;
      if (el('add-ruac')) d.ruac = el('add-ruac').value;
    }

    setupAutocomplete(inputId, listId, options, onSelect) {
      const input = document.getElementById(inputId);
      const list = document.getElementById(listId);
      if (!input || !list) return;
      let activeIdx = -1;

      input.addEventListener('input', () => {
        const val = input.value.toLowerCase();
        if (val.length < 1) { list.classList.remove('show'); return; }
        const filtered = options.filter(o => o.toLowerCase().includes(val));
        if (filtered.length === 0) { list.classList.remove('show'); return; }
        list.innerHTML = filtered.map((o,i) => `<div class="pata-ac-item" data-val="${o}">${o}</div>`).join('');
        list.classList.add('show');
        activeIdx = -1;
        list.querySelectorAll('.pata-ac-item').forEach(item => {
          item.addEventListener('click', () => { input.value = item.dataset.val; onSelect(item.dataset.val); list.classList.remove('show'); });
        });
      });

      input.addEventListener('keydown', (e) => {
        const items = list.querySelectorAll('.pata-ac-item');
        if (!list.classList.contains('show') || items.length === 0) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); items.forEach((it,i) => it.classList.toggle('active', i===activeIdx)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); items.forEach((it,i) => it.classList.toggle('active', i===activeIdx)); }
        else if (e.key === 'Enter') { e.preventDefault(); if (activeIdx >= 0) { input.value = items[activeIdx].dataset.val; onSelect(items[activeIdx].dataset.val); list.classList.remove('show'); } }
        else if (e.key === 'Escape') { list.classList.remove('show'); }
      });

      input.addEventListener('blur', () => setTimeout(() => list.classList.remove('show'), 200));
    }

    async submitNewPet(isSenior) {
      this.saveStep2Fields();
      const d = this.addFormData;

      // Validate
      let valid = true;
      const setErr = (id, msg) => { const el = document.getElementById(id); if (el) el.textContent = msg; };
      if (!d.gender) { setErr('err-gender', 'Selecciona el sexo'); valid = false; }
      if (d.breedType === 'raza' && !d.breed) { setErr('err-breed', 'Selecciona la raza'); valid = false; }
      if (!d.coatColor) { setErr('err-coat', 'Selecciona el color de pelo'); valid = false; }
      if (!valid) { this.toast('Completa los campos requeridos', 'error'); return; }

      const btn = document.getElementById('add-submit');
      btn.disabled = true;
      btn.textContent = 'Registrando...';

      try {
        const payload = {
          memberstackId: this.member.id,
          name: d.name,
          petType: d.petType,
          ageValue: parseInt(d.ageValue),
          ageUnit: d.ageUnit,
          gender: d.gender,
          breed: d.isMixed ? 'Mestizo' : d.breed,
          breedSize: d.breedSize,
          isMixed: d.isMixed,
          coatColor: d.coatColor,
          noseColor: d.noseColor,
          eyeColor: d.eyeColor,
          isAdopted: d.isAdopted,
          adoptionStory: d.adoptionStory,
          primaryPhotoUrl: this.uploadedPhotoUrl,
          isSenior: isSenior,
          vetCertificateUrl: this.uploadedVetUrl,
          ruac: d.ruac || '',
        };

        const res = await fetch(`${API_URL}/api/user/add-pet`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();

        if (result.success) {
          this.toast('🐾 ¡Mascota registrada exitosamente!', 'success');
          this.closeModal();
          await this.loadPets();
          this.render();
        } else {
          this.toast(result.error || 'Error al registrar', 'error');
          btn.disabled = false;
          btn.textContent = 'Registrar mascota ✓';
        }
      } catch (err) {
        this.toast('Error de conexión', 'error');
        btn.disabled = false;
        btn.textContent = 'Registrar mascota ✓';
      }
    }

    toast(msg, type = 'success') {
      this.toastEl.textContent = msg;
      this.toastEl.className = `pata-toast ${type} show`;
      setTimeout(() => this.toastEl.classList.remove('show'), 3500);
    }
  }

  // ── Auto-init ──
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => new PetCardsWidget());
  } else {
    new PetCardsWidget();
  }
})();
</script>
