<!-- ============================================ -->
<!-- Vet-Bot Integration v3.0 - setCustomFields -->
<!-- app.pataamiga.mx | Chatbot Builder AI v6 -->
<!-- ============================================ -->

<!-- Primero cargamos el plugin de Chatbot Builder AI -->
<script src="https://app.chatgptbuilder.io/webchat/plugin.js?v=6"></script>

<!-- Script de integración -->
<script>
    (function () {
        'use strict';

        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const API_URL = 'https://app.pataamiga.mx/api';

        // ============================================
        // FUNCIÓN: Generar token de sesión
        // ============================================
        async function generateSessionToken(memberstackId, email) {
            try {
                const response = await fetch(`${API_URL}/auth/session-token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        memberstackId: memberstackId,
                        email: email
                    })
                });

                if (!response.ok) {
                    console.error('[VetBot] Token request failed:', response.status);
                    return null;
                }

                const data = await response.json();
                return data.success ? data.sessionToken : null;

            } catch (error) {
                console.error('[VetBot] Token error:', error);
                return null;
            }
        }

        // ============================================
        // LÓGICA PRINCIPAL
        // ============================================
        async function initVetBot() {
            // Verificar que Memberstack esté cargado
            if (!window.$memberstackDom) {
                console.log('[VetBot] Memberstack not available');
                return;
            }

            try {
                // Obtener usuario actual
                const member = await window.$memberstackDom.getCurrentMember();

                // 1. Verificar si está logueado
                if (!member || !member.data) {
                    console.log('[VetBot] User not logged in - bot hidden');
                    return;
                }

                // 2. VERIFICACIÓN DE MEMBRESÍA PAGADA
                const planConnections = member.data.planConnections || [];
                const hasActivePaidPlan = planConnections.some(plan =>
                    plan.status === 'ACTIVE' || plan.status === 'TRIALING'
                );

                if (!hasActivePaidPlan) {
                    console.log('[VetBot] User logged in but has no active paid plan - bot hidden');
                    return;
                }

                const userEmail = member.data.auth?.email;
                console.log('[VetBot] Active membership confirmed for:', userEmail);

                // Generar token de sesión
                const sessionToken = await generateSessionToken(
                    member.data.id,
                    userEmail
                );

                // Obtener nombre del usuario
                const firstName = member.data.customFields?.['first-name'] ||
                    userEmail?.split('@')[0] ||
                    'Usuario';

                console.log('[VetBot] Initializing bot with setCustomFields...');
                console.log('[VetBot] Token:', sessionToken ? sessionToken.substring(0, 8) + '...' : 'null');
                console.log('[VetBot] Email:', userEmail);

                // ============================================
                // INICIALIZAR CON setCustomFields (CBB API)
                // Ref: https://docs.chatbotbuilder.ai
                // setCustomFields usa un array de {id, value}
                // donde "id" es el nombre del Custom User Field
                // ============================================
                ktt10.setup({
                    id: "K4THS5LyA99jKDKYNgD3",
                    accountId: "1146761",
                    color: "#36D6B5",
                    setCustomFields: [
                        { id: "session_token", value: sessionToken || "" },
                        { id: "user_email", value: userEmail || "" },
                        { id: "first_name", value: firstName || "" },
                        { id: "memberstack_id", value: member.data.id || "" }
                    ]
                });

                console.log('[VetBot] ✅ Bot initialized with setCustomFields successfully');

            } catch (error) {
                console.error('[VetBot] Initialization error:', error);
            }
        }

        // ============================================
        // EJECUTAR
        // ============================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initVetBot);
        } else {
            initVetBot();
        }
    })();
</script>
