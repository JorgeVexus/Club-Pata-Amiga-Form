<script src="https://app.chatgptbuilder.io/webchat/plugin.js?v=6"></script>

<script>
    (function () {
        'use strict';

        const API_URL = 'https://app.pataamiga.mx/api';
        const log = (...args) => console.log('[VetBot-Prod]', ...args);

        // Herramienta de Diagnóstico
        window.vetBotDiagnostics = function () {
            log('Iniciando diagnóstico...');
            const iframe = document.querySelector('#ktt10-iframe');
            if (!iframe) return log('❌ Error: El bot no está cargado.');
            const src = iframe.getAttribute('data-src') || iframe.getAttribute('src');
            const urlParams = new URLSearchParams(src.split('?')[1]);
            log('URL Iframe:', src);
            log('- Ref:', urlParams.get('ref'));
            log('- SCF (Custom Fields):', urlParams.get('scf'));
        };

        async function generateToken(memberstackId, email) {
            try {
                const response = await fetch(`${API_URL}/auth/session-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memberstackId, email })
                });
                const data = await response.json();
                return data.sessionToken || data.session_token || data.token;
            } catch (e) { return null; }
        }

        async function initBot() {
            if (!window.$memberstackDom) return;

            try {
                const member = await window.$memberstackDom.getCurrentMember();
                if (!member || !member.data) return log('Sesión no iniciada.');

                const userEmail = member.data.auth?.email;
                const firstName = member.data.customFields?.['first-name'] || userEmail?.split('@')[0] || 'Cliente';

                log('Obteniendo token de producción...');
                const token = await generateToken(member.data.id, userEmail);

                const setup = () => {
                    if (typeof ktt10 === 'undefined') { setTimeout(setup, 500); return; }

                    log('Inicializando Bot Real de Agencia...');

                    ktt10.setup({
                        id: "K4THS5LyA99jKDKYNgD3", // ID REAL
                        accountId: "1146761",      // ACCOUNT REAL
                        color: "#36D6B5",
                        setCustomFields: [
                            { id: "673882", value: token },      // session_token
                            { id: "515388", value: userEmail },  // Correo_Cliente
                            { id: "620522", value: firstName }  // NombreCliente
                        ],
                        // ACTIVADO: 'ref' dispara el flujo de saludo de la agencia
                        ref: token || "welcome",
                        email: userEmail,
                        first_name: firstName
                    });

                    log('✅ Bot Real de Producción listo.');
                };
                setup();
            } catch (e) { console.error(e); }
        }

        setTimeout(initBot, 1000);
    })();
</script>
