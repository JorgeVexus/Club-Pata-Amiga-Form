<!-- Vet-Bot Integration v3.4 - Ref Parameter & Diagnostics -->
<!-- app.pataamiga.mx | Chatbot Builder AI v6 -->
<!-- ============================================ -->

<script src="https://app.chatgptbuilder.io/webchat/plugin.js?v=6"></script>

<script>
    (function () {
        'use strict';

        const API_URL = 'https://app.pataamiga.mx/api';
        const log = (...args) => console.log('[VetBot]', ...args);

        // Herramienta de Diagnóstico Global
        window.vetBotDiagnostics = function () {
            log('Iniciando diagnóstico...');
            const iframe = document.querySelector('#ktt10-iframe');
            if (!iframe) {
                log('❌ Error: No se encontró el iframe del bot.');
                return;
            }
            const src = iframe.getAttribute('data-src') || iframe.getAttribute('src');
            log('URL del Iframe:', src);

            const urlParams = new URLSearchParams(src.split('?')[1]);
            log('Parámetros detectados:');
            log('- ID:', urlParams.get('id'));
            log('- Ref:', urlParams.get('ref'));
            log('- SCF (Custom Fields):', urlParams.get('scf'));

            if (urlParams.get('ref')) {
                log('✅ Parámetro REF presente. Este es el método v3.4.');
            } else {
                log('⚠️ Parámetro REF ausente. El bot podría no identificar al usuario.');
            }
        };

        async function generateSessionToken(memberstackId, email) {
            try {
                const response = await fetch(`${API_URL}/auth/session-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memberstackId, email })
                });
                const data = await response.json();
                return data.success ? data.sessionToken : null;
            } catch (error) {
                console.error('[VetBot] Token error:', error);
                return null;
            }
        }

        async function initVetBot() {
            if (!window.$memberstackDom) return;

            try {
                const member = await window.$memberstackDom.getCurrentMember();
                if (!member || !member.data) {
                    log('Usuario no logueado.');
                    return;
                }

                const userEmail = member.data.auth?.email;
                const firstName = member.data.customFields?.['first-name'] || userEmail?.split('@')[0] || 'Usuario';

                log('Usuario detectado:', userEmail);
                const sessionToken = await generateSessionToken(member.data.id, userEmail);

                const executeSetup = () => {
                    if (typeof ktt10 === 'undefined') {
                        setTimeout(executeSetup, 500);
                        return;
                    }

                    log('Inicializando CBB v3.4 (Ref Strategy)...');

                    const fields = [
                        { id: "session_token", value: sessionToken || "" },
                        { id: "user_email", value: userEmail || "" }
                    ];

                    ktt10.setup({
                        id: "K4THS5LyA99jKDKYNgD3",
                        accountId: "1146761",
                        color: "#36D6B5",
                        // Método 1: setCustomFields (Format oficial)
                        setCustomFields: fields,
                        // Método 2: REF parameter (Legacy/Fallback muy potente)
                        ref: sessionToken || "no-token",
                        // Otros datos directos
                        email: userEmail,
                        first_name: firstName
                    });

                    log('✅ Bot inicializado v3.4. Ejecuta "vetBotDiagnostics()" para verificar.');
                };

                executeSetup();

            } catch (error) {
                console.error('[VetBot] Error fatal:', error);
            }
        }

        // Ejecutar con un pequeño delay
        setTimeout(initVetBot, 800);
    })();
</script>
