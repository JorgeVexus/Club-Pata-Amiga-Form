<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  .pa-wellness-form {
    --lime: #7DD8D5; --lime-dark: #00BBB4; --lime-light: #E0F7F6;
    --text-dark: #2D3748; --text-light: #718096; --white: #FFFFFF;
    --border: #CBD5E0; --error: #E53E3E; --success: #38A169;
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 600px; margin: 0 auto; padding: 0; background: transparent; box-shadow: none; border-radius: 0;
  }
  .pa-wellness-form * { box-sizing: border-box; }
  .pa-form-header { text-align: center; margin-bottom: 24px; }
  .pa-form-header p { color: var(--text-light); font-size: 14px; line-height: 1.6; max-width: 90%; margin: 0 auto; }
  .pa-form-group { margin-bottom: 20px; }
  .pa-form-group label { display: block; font-weight: 500; font-size: 13px; color: var(--text-dark); margin-bottom: 8px; }
  .pa-form-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 14px; font-size: 15px; font-family: inherit; color: var(--text-dark); background: var(--white); transition: all 0.2s ease; outline: none; -webkit-appearance: none; appearance: none; }
  .pa-form-input::placeholder { color: var(--text-light); }
  .pa-form-input:focus { border-color: var(--lime-dark); box-shadow: 0 0 0 4px var(--lime-light); }
  .pa-form-input.error { border-color: var(--error); }
  .pa-form-input.valid { border-color: var(--success); }
  .pa-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 560px) { .pa-form-row { grid-template-columns: 1fr; } }
  .pa-phone-row { display: flex; gap: 12px; align-items: flex-start; }
  .pa-country-select { width: 100px; min-width: 100px; padding: 14px 12px; border: 2px solid var(--border); border-radius: 14px; font-size: 14px; font-family: inherit; color: var(--text-dark); background: var(--white); cursor: pointer; transition: all 0.2s ease; -webkit-appearance: none; appearance: none; }
  .pa-country-select:focus { border-color: var(--lime-dark); box-shadow: 0 0 0 4px var(--lime-light); }
  .pa-phone-input-wrapper { flex: 1; }
  .pa-checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  @media (max-width: 480px) { .pa-checkbox-grid { grid-template-columns: 1fr; } }
  .pa-checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--white); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s ease; }
  .pa-checkbox-item:hover { background: var(--lime-bg); border-color: var(--lime-dark); }
  .pa-checkbox-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--lime-dark); cursor: pointer; flex-shrink: 0; }
  .pa-checkbox-item span { font-size: 14px; font-weight: 500; color: var(--text-dark); }
  .pa-checkbox-item input[type="checkbox"]:focus-visible { outline: 2px solid var(--lime-dark); outline-offset: 2px; }
  .pa-checkbox-grid.error .pa-checkbox-item { border-color: var(--error); }
  .pa-btn-submit { width: 100%; padding: 16px 32px; background: var(--white); border: 3px solid var(--text-dark); border-radius: 50px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: var(--lime-dark); cursor: pointer; transition: all 0.2s ease; margin-top: 4px; }
  .pa-btn-submit:hover:not(:disabled) { background: var(--lime-dark); color: var(--white); border-color: var(--lime-dark); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 187, 180, 0.3); }
  .pa-btn-submit:active:not(:disabled) { transform: translateY(0); }
  .pa-btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .pa-btn-submit.loading { position: relative; color: transparent; pointer-events: none; }
  .pa-btn-submit.loading::after { content: ""; position: absolute; width: 22px; height: 22px; top: 50%; left: 50%; margin-left: -11px; margin-top: -11px; border: 3px solid var(--lime-dark); border-top-color: transparent; border-radius: 50%; animation: pa-spin 0.8s linear infinite; }
  @keyframes pa-spin { to { transform: rotate(360deg); } }
  .pa-toast { position: fixed; bottom: 24px; right: 24px; left: auto; padding: 14px 22px; border-radius: 10px; font-weight: 500; font-size: 13px; z-index: 2147483647; animation: pa-slideIn 0.3s ease; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); font-family: inherit; max-width: 90vw; word-wrap: break-word; }
  .pa-toast.success { background: var(--success); color: white; }
  .pa-toast.error { background: var(--error); color: white; }
  @keyframes pa-slideIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .pa-error-message { color: var(--error); font-size: 12px; margin-top: 6px; display: none; }
  .pa-error-message.visible { display: block; }
  .pa-wellness-form *:focus-visible { outline: 2px solid var(--lime-dark); outline-offset: 2px; }
  .pa-required { color: var(--error); margin-left: 4px; }
</style>

  <button type="submit" id="paSubmitBtn" style="width:100%;padding:16px 32px;background:var(--white);border:3px solid var(--text-dark);border-radius:50px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;color:var(--lime-dark);cursor:pointer;transition:all 0.2s ease;margin-top:4px;">Registrar mi centro</button>
</form>

<script>
(function() {
  'use strict';
  console.log('[PA Wellness] Script initiating...');
  
  const API_ENDPOINT = '/api/webflow/wellness-lead';
  
  // Robust DOM ready
  function ready(fn) {
    if (document.readyState !== 'loading') { fn(); }
    else { document.addEventListener('DOMContentLoaded', fn); }
  }
  
  function initForm() {
    const form = document.getElementById('paWellnessForm');
    const submitBtn = document.getElementById('paSubmitBtn');
    
    if (!form || !submitBtn) {
      console.error('[PA Wellness] Form or button not found, retrying...');
      setTimeout(initForm, 100);
      return;
    }
    
    console.log('[PA Wellness] Form initialized');
    
    // Prevent Webflow form handler if present
    if (form._paInitialized) return;
    form._paInitialized = true;
    
    // Helper functions
    const $ = (sel, ctx = document) => ctx.querySelector(sel);
    const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));
    
    function getInputElement(fieldId) {
      const idMap = { contact_name: 'paContactName', email: 'paEmail', phone: 'paPhone', services: 'paServicesGrid' };
      return document.getElementById(idMap[fieldId] || 'pa' + fieldId.charAt(0).toUpperCase() + fieldId.slice(1));
    }
    
    function showError(fieldId, message) {
      const errorEl = document.getElementById('paError-' + fieldId);
      const inputEl = getInputElement(fieldId);
      if (errorEl) { errorEl.textContent = message; errorEl.classList.add('visible'); errorEl.style.display = 'block'; }
      if (inputEl) inputEl.classList.add('error');
      if (fieldId === 'services') { const grid = document.getElementById('paServicesGrid'); if (grid) { grid.classList.add('error'); grid.style.borderColor = '#E53E3E'; } }
    }
    
    function clearError(fieldId) {
      const errorEl = document.getElementById('paError-' + fieldId);
      const inputEl = getInputElement(fieldId);
      if (errorEl) { errorEl.classList.remove('visible'); errorEl.style.display = 'none'; }
      if (inputEl) inputEl.classList.remove('error');
      if (fieldId === 'services') { const grid = document.getElementById('paServicesGrid'); if (grid) grid.classList.remove('error'); }
    }
    
    function getInputElement(fieldId) {
      const idMap = { contact_name: 'paContactName', email: 'paEmail', phone: 'paPhone', services: 'paServicesGrid' };
      return document.getElementById(idMap[fieldId] || 'pa' + fieldId.charAt(0).toUpperCase() + fieldId.slice(1));
    }
    
    function clearAllErrors() {
      $$('.pa-error-message.visible').forEach(el => { el.classList.remove('visible'); el.style.display = 'none'; });
      $$('.pa-form-input.error, select.error, .pa-checkbox-grid.error').forEach(el => el.classList.remove('error'));
    }
    
    function showToast(message, type = 'success') {
      $$('.pa-toast').forEach(el => el.remove());
      const toast = document.createElement('div');
      toast.className = 'pa-toast ' + type;
      toast.textContent = message;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'polite');
      document.body.appendChild(toast);
      toast.offsetHeight;
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(20px) scale(0.95)'; setTimeout(() => toast.remove(), 300); }, 5000);
    }
    
    function setLoading(isLoading) {
      const btn = submitBtn || document.getElementById('paSubmitBtn');
      if (!btn) return;
      if (isLoading) { btn.classList.add('loading'); btn.disabled = true; btn.textContent = 'Registrando...'; btn.setAttribute('aria-busy', 'true'); }
      else { btn.classList.remove('loading'); btn.disabled = false; btn.textContent = 'Registrar mi centro'; btn.removeAttribute('aria-busy'); }
    }
    
    function validateForm() {
      clearAllErrors();
      let isValid = true;
      
      const contactName = document.getElementById('paContactName');
      if (!contactName.value.trim()) { showError('contact_name', 'El nombre es requerido'); isValid = false; }
      
      const email = document.getElementById('paEmail');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email.value.trim() || !emailRegex.test(email.value.trim())) { showError('email', 'Correo electrónico válido requerido'); isValid = false; }
      
      const servicesChecked = document.querySelectorAll('input[name="services"]:checked');
      if (servicesChecked.length === 0) { showError('services', 'Selecciona al menos un tipo de establecimiento'); isValid = false; }
      
      const phone = document.getElementById('paPhone');
      if (phone.value.trim()) { const digitsOnly = phone.value.replace(/\D/g, ''); if (digitsOnly.length < 10) { showError('phone', 'El teléfono debe tener al menos 10 dígitos'); isValid = false; } }
      
      return isValid;
    }
    
    function clearError(fieldId) {
      const errorEl = document.getElementById('paError-' + fieldId);
      const inputEl = getInputElement(fieldId);
      if (errorEl) { errorEl.classList.remove('visible'); errorEl.style.display = 'none'; }
      if (inputEl) inputEl.classList.remove('error');
      if (fieldId === 'services') { const grid = document.getElementById('paServicesGrid'); if (grid) grid.classList.remove('error'); }
    }
    
    function clearAllErrors() {
      $$('.pa-error-message.visible').forEach(el => { el.classList.remove('visible'); el.style.display = 'none'; });
      $$('.pa-form-input.error, select.error, .pa-checkbox-grid.error').forEach(el => el.classList.remove('error'));
    }
    
    function showToast(message, type = 'success') {
      $$('.pa-toast').forEach(el => el.remove());
      const toast = document.createElement('div');
      toast.className = 'pa-toast ' + type;
      toast.textContent = message;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'polite');
      document.body.appendChild(toast);
      toast.offsetHeight;
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(20px) scale(0.95)'; setTimeout(() => toast.remove(), 300); }, 5000);
    }
    
    function setLoading(isLoading) {
      const btn = document.getElementById('paSubmitBtn');
      if (!btn) return;
      if (isLoading) { btn.classList.add('loading'); btn.disabled = true; btn.textContent = 'Registrando...'; btn.setAttribute('aria-busy', 'true'); }
      else { btn.classList.remove('loading'); btn.disabled = false; btn.textContent = 'Registrar mi centro'; btn.removeAttribute('aria-busy'); }
    }
    
    // Attach events
    const form = document.getElementById('paWellnessForm');
    const submitBtn = document.getElementById('paSubmitBtn');
    
    if (!form || !submitBtn) {
      console.error('[PA Wellness] Elements not found');
      return;
    }
    
    // Prevent double init
    if (form._paInitialized) return;
    form._paInitialized = true;
    
    // Real-time validation clearing
    ['contact_name', 'email', 'phone'].forEach(fieldId => {
      const el = getInputElement(fieldId);
      if (el) {
        el.addEventListener('input', () => clearError(fieldId));
        el.addEventListener('blur', () => {
          if (fieldId === 'email') {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (el.value.trim() && !emailRegex.test(el.value.trim())) showError('email', 'Correo electrónico válido requerido');
          }
          if (fieldId === 'phone' && el.value.trim()) {
            const digitsOnly = el.value.replace(/\D/g, '');
            if (digitsOnly.length < 10) showError('phone', 'El teléfono debe tener al menos 10 dígitos');
          }
        });
      });
    });
    
    // Checkboxes
    $$('input[name="services"]').forEach(cb => cb.addEventListener('change', () => clearError('services')));
    
    // Phone formatting
    const phoneInput = document.getElementById('paPhone');
    if (phoneInput) {
      phoneInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 10) value = value.slice(0, 10);
        if (value.length > 6) value = value.replace(/(\d{3})(\d{3})(\d{0,4})/, '$1 $2 $3');
        else if (value.length > 3) value = value.replace(/(\d{3})(\d{0,3})/, '$1 $2');
        e.target.value = value;
      });
    }
    
    // Toast
    function showToast(message, type = 'success') {
      $$('.pa-toast').forEach(el => el.remove());
      const toast = document.createElement('div');
      toast.className = 'pa-toast ' + type;
      toast.textContent = message;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'polite');
      document.body.appendChild(toast);
      toast.offsetHeight;
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(20px) scale(0.95)'; setTimeout(() => toast.remove(), 300); }, 5000);
    }
    
    function setLoading(isLoading) {
      const btn = document.getElementById('paSubmitBtn');
      if (!btn) return;
      if (isLoading) { btn.classList.add('loading'); btn.disabled = true; btn.textContent = 'Registrando...'; btn.setAttribute('aria-busy', 'true'); }
      else { btn.classList.remove('loading'); btn.disabled = false; btn.textContent = 'Registrar mi centro'; btn.removeAttribute('aria-busy'); }
    }
    
    function validateForm() {
      clearAllErrors();
      let isValid = true;
      
      const contactName = document.getElementById('paContactName');
      if (!contactName.value.trim()) { showError('contact_name', 'El nombre es requerido'); isValid = false; }
      
      const email = document.getElementById('paEmail');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email.value.trim() || !emailRegex.test(email.value.trim())) { showError('email', 'Correo electrónico válido requerido'); isValid = false; }
      
      const servicesChecked = $$('input[name="services"]:checked');
      if (servicesChecked.length === 0) { showError('services', 'Selecciona al menos un tipo de establecimiento'); isValid = false; }
      
      const phone = document.getElementById('paPhone');
      if (phone.value.trim()) { const digitsOnly = phone.value.replace(/\D/g, ''); if (digitsOnly.length < 10) { showError('phone', 'El teléfono debe tener al menos 10 dígitos'); isValid = false; } }
      
      return isValid;
    }
    
    function showError(fieldId, message) {
      const errorEl = document.getElementById('paError-' + fieldId);
      const inputEl = getInputElement(fieldId);
      if (errorEl) { errorEl.textContent = message; errorEl.classList.add('visible'); errorEl.style.display = 'block'; }
      if (inputEl) inputEl.classList.add('error');
      if (fieldId === 'services') { const grid = document.getElementById('paServicesGrid'); if (grid) { grid.classList.add('error'); grid.style.borderColor = '#E53E3E'; } }
    }
    
    function clearError(fieldId) {
      const errorEl = document.getElementById('paError-' + fieldId);
      const inputEl = getInputElement(fieldId);
      if (errorEl) { errorEl.classList.remove('visible'); errorEl.style.display = 'none'; }
      if (inputEl) inputEl.classList.remove('error');
      if (fieldId === 'services') { const grid = document.getElementById('paServicesGrid'); if (grid) grid.classList.remove('error'); }
    }
    
    // Main submit handler - MULTIPLE STRATEGIES TO PREVENT RELOAD
    const handleSubmit = async function(e) {
      console.log('[PA Wellness] Submit event fired');
      
      // STRATEGY 1: Prevent default at multiple levels
      if (e && e.preventDefault) e.preventDefault();
      if (e && e.stopPropagation) e.stopPropagation();
      if (e && e.stopImmediatePropagation) e.stopImmediatePropagation();
      
      // Also prevent on form
      e.returnValue = false; // IE/Edge
      return false; // Old school
      
      if (!validateForm()) { showToast('Por favor corrige los errores', 'error'); return false; }
      
      setLoading(true);
      
      // Build FormData
      const formData = new FormData(form);
      const services = $$('input[name="services"]:checked').map(cb => cb.value).join(',');
      formData.delete('services');
      formData.append('services', services);
      formData.append('source', 'webflow-embed');
      formData.append('page_url', window.location.href);
      
      try {
        console.log('[PA Wellness] Sending to API...');
        const response = await fetch('/api/webflow/wellness-lead', { method: 'POST', body: formData });
        console.log('[PA Wellness] Response:', response.status);
        const data = await response.json();
        console.log('[PA Wellness] Data:', data);
        
        if (data.success) { 
          showToast('¡Gracias por tu interés! Te contactaremos pronto.', 'success'); 
          form.reset(); 
          $$('.pa-checkbox-grid.error').forEach(el => el.classList.remove('error'));
        } else { showToast(data.error || data.message || 'Error al registrar', 'error'); }
      } catch (err) { console.error('Error:', err); showToast('Error de conexión. Intenta de nuevo.', 'error'); }
      finally { setLoading(false); }
      return false;
    };
    
    // ATTACH EVENT LISTENERS - MULTIPLE WAYS
    // 1. Standard submit event
    form.addEventListener('submit', handleSubmit, true); // useCapture = true
    
    // 2. Button click backup
    submitBtn.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      form.requestSubmit(); // triggers form submit event
      return false;
    }, true);
    
    // 3. Also on mousedown as ultimate fallback
    submitBtn.addEventListener('mousedown', function(e) {
      e.preventDefault();
    }, true);
    
    console.log('[PA Wellness] All listeners attached');
  }
  
  // Initialize
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initForm);
  } else {
    initForm();
  }
  
  // Also try immediately in case DOMContentLoaded already fired
  setTimeout(initForm, 0);
})();
</script>
