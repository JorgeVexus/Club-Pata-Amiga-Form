<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Completar Perfil Widget</title>
    <style>
        body {
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        .instructions {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #ddd;
            font-family: sans-serif;
        }
    </style>
    <!-- Memberstack -->
    <script src="https://api.memberstack.io/static/memberstack.js?custom" data-memberstack-id="app_cmiqkcuzv00670ssogle4ah3n"></script>
</head>
<body>
    <div class="container">
        <div class="instructions">
            <h3>Widget: Completar Perfil</h3>
            <p>Este widget detecta automáticamente qué información le falta al miembro (Datos personales, INE, comprobante de domicilio o registro de mascota) y le guía para completarla.</p>
            <code>&lt;div id="pata-complete-profile"&gt;&lt;/div&gt;</code>
        </div>

        <!-- Widget Container -->
        <div id="pata-complete-profile"></div>
    </div>

    <!-- Configuration -->
    <script>
        window.PATA_AMIGA_CONFIG = {
            apiUrl: window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://app.pataamiga.mx'
        };
    </script>

    <!-- Widget Script -->
    <script src="complete-profile-widget.js"></script>
</body>
</html>
