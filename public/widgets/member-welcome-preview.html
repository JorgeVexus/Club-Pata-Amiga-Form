<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview Modal Bienvenida Miembro</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #faf7f1;
            font-family: Arial, sans-serif;
        }
        .preview-shell {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 16px;
        }
    </style>
</head>
<body>
    <div class="preview-shell">
        <div id="pata-amiga-membership-widget"></div>
    </div>

    <script>
        window.PATA_AMIGA_CONFIG = {
            apiUrl: window.location.origin
        };

        window.$memberstackDom = {
            getCurrentMember() {
                return Promise.resolve({
                    data: {
                        id: 'preview-member-welcome',
                        auth: { email: 'preview@pataamiga.mx' },
                        customFields: {
                            'first-name': 'Lucero'
                        }
                    }
                });
            }
        };
    </script>
    <script src="/widgets/unified-membership-widget.js?v=welcome-20260717"></script>
    <script>
        window.addEventListener('load', () => {
            window.setTimeout(() => window.pataWidget?.showMemberWelcomeModal(), 500);
        });
    </script>
</body>
</html>
