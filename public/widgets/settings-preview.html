<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - Centro de Configuración</title>
    <style>
        body {
            background-color: #F7FAFC;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dev-header {
            width: 100%;
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #E2E8F0;
            text-align: center;
        }
        .dev-header h2 { margin: 0 0 10px 0; color: #7DD8D5; }
        .dev-header p { margin: 0; color: #718096; font-size: 14px; }
        
        /* Contenedor del widget */
        .widget-wrapper {
            width: 100%;
            max-width: 1000px;
            background: transparent;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="dev-header">
        <h2>🛠️ Settings Widget Preview</h2>
        <p>Vista local para validar el diseño y la integración. Memberstack y API están simulados para este preview.</p>
    </div>

    <div class="widget-wrapper">
        <!-- Marcador para el widget -->
        <div data-pata-widget="settings"></div>
    </div>

    <script>
        // 1. Configuración de API (Local)
        window.PATA_AMIGA_CONFIG = {
            apiUrl: 'http://localhost:3000'
        };

        // 2. Mock de Memberstack
        window.$memberstackDom = {
            getCurrentMember: async function() {
                return {
                    data: {
                        id: "mem_dev_test_user",
                        auth: { email: "usuario-prueba@pataamiga.mx" }
                    }
                };
            },
            openModal: function(type) {
                alert('Abriendo modal de Memberstack: ' + type);
            }
        };

        // 3. Mock de fetch para interceptar llamadas al API local
        const originalFetch = window.fetch;
        window.fetch = async function(url, options) {
            if (url.includes('/api/user/preferences')) {
                console.log('🌐 [MOCK API] Llamada a:', url, options);
                
                if (!options || options.method === 'GET') {
                    return new Response(JSON.stringify({
                        success: true,
                        preferences: {
                            notif_email: true,
                            notif_whatsapp: false,
                            notif_alerts: true,
                            notif_payments: true,
                            notif_news: false
                        }
                    }), { status: 200, headers: { 'Content-Type': 'application/json' } });
                }
                
                if (options.method === 'POST') {
                    const body = JSON.parse(options.body);
                    console.log('💾 [MOCK API] Guardando preferencias:', body.preferences);
                    return new Response(JSON.stringify({ success: true }), { status: 200 });
                }
            }
            return originalFetch(url, options);
        };
    </script>

    <!-- 4. Cargar el widget -->
    <script src="/widgets/user-settings-widget.js"></script>

</body>
</html>
