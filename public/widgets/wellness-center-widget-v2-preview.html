<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wellness Center Widget V2 Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;min-height:100%;background:#f8f5ee;font-family:Outfit,sans-serif}
    .preview-switcher{position:fixed;right:16px;bottom:16px;z-index:20000;display:flex;flex-wrap:wrap;gap:6px;max-width:calc(100vw - 32px);padding:8px;border:1px solid #ece7dd;border-radius:999px;background:rgba(255,255,255,.96);box-shadow:0 12px 30px rgba(21,63,59,.14)}
    .preview-switcher a{padding:8px 12px;border-radius:999px;color:#1e5d57;font-size:12px;font-weight:700;text-decoration:none}
    .preview-switcher a.active{background:#21bcaf;color:#fff}
  </style>
</head>
<body>
  <div id="pata-wellness-dashboard"></div>
  <nav class="preview-switcher" aria-label="Cambiar estado del preview">
    <a data-status="approved" href="?status=approved">Aprobado</a>
    <a data-status="pending" href="?status=pending">Pendiente</a>
    <a data-status="rejected" href="?status=rejected">Rechazado</a>
    <a data-status="appealed" href="?status=appealed">Apelado</a>
    <a data-status="cancelled" href="?status=cancelled">Cancelado</a>
  </nav>
  <script>
    const previewStatus = new URLSearchParams(location.search).get('status') || 'approved';
    document.querySelector(`[data-status="${previewStatus}"]`)?.classList.add('active');
    window.PATA_AMIGA_CONFIG = { API_BASE_URL: location.origin, DEBUG: true };
    window.$memberstackDom = { getCurrentMember: async () => ({ data: { id: 'preview-member' } }) };
    const center = {
      id:'preview-center', memberstack_id:'preview-member', status:previewStatus,
      establishment_name:'VetCare Roma', name:'VetCare Servicios Veterinarios S.A. de C.V.',
      email:'hola@vetcare.mx', phone:'55 5555 0101', address:'Av. Álvaro Obregón 120, Roma Norte',
      services:['Consulta general','Estética','Vacunación'], promotion_details:'15% de descuento en consulta general.',
      rejection_reason:'El comprobante de domicilio no coincide con la dirección principal registrada.',
      welcome_shown:true, logo_url:'', social_links:{instagram:'https://instagram.com/'},
      bank_name:'BBVA', bank_clabe:'012180001234567890', payments:[], appointments:[], locations:[]
    };
    const nativeFetch = window.fetch.bind(window);
    window.fetch = async (input, options={}) => {
      const url = String(input);
      if (url.includes('/api/wellness/me')) return new Response(JSON.stringify({success:true,data:center}),{status:200,headers:{'Content-Type':'application/json'}});
      if (url.includes('/api/wellness/')) return new Response(JSON.stringify({success:true,data:center}),{status:200,headers:{'Content-Type':'application/json'}});
      if (url.includes('/api/upload/')) return new Response(JSON.stringify({success:true,url:'https://placehold.co/600x400'}),{status:200,headers:{'Content-Type':'application/json'}});
      return nativeFetch(input,options);
    };
  </script>
  <script src="./wellness-center-widget.js"></script>
</body>
</html>
