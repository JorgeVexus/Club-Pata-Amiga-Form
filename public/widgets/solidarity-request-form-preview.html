<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Formulario de Solicitud Apoyo Económico</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Fraiche';
            src: url('https://app.pataamiga.mx/fonts/fraiche/fraiche-regular.otf') format('opentype');
            font-weight: normal;
        }
        * { box-sizing: border-box; }
        body {
            background-color: #FFFCE7;
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden; /* Prevent body overflow during testing */
        }
        .preview-header {
            background: #181C1C;
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        #pata-solidarity-form {
            background: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
            max-width: 900px;
            margin: 0 auto;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .preview-header { padding: 15px; border-radius: 15px; margin-bottom: 20px; }
            #pata-solidarity-form { padding: 0; border-radius: 0; background: transparent; box-shadow: none; }
        }
        .debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #181C1C;
            z-index: 10000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .debug-panel h4 { margin: 0 0 10px 0; font-family: 'Fraiche', sans-serif; }
        .debug-btn {
            background: #FE8F15;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="preview-header">
        <div>
            <h2 style="margin:0; font-family: 'Fraiche', sans-serif;">Pata Amiga — Vista Previa Formulario</h2>
            <p style="margin:0; opacity: 0.7; font-size: 14px;">Módulo de solicitudes de apoyo económico</p>
        </div>
        <div style="text-align: right;">
            <span style="background: #9FD406; color: #181C1C; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 800;">WIDGET ACTIVO</span>
        </div>
    </div>

    <!-- Container for the widget -->
    <div id="pata-solidarity-form"></div>

    <div class="debug-panel">
        <h4>Panel de Control</h4>
        <button class="debug-btn" onclick="initMock()">Cargar con Mock Data</button>
        <button class="debug-btn" style="background: #15BEB2;" onclick="showSuccess()">Ver Modal Éxito</button>
    </div>

    <!-- Configuration -->
    <script>
        window.PATA_AMIGA_CONFIG = {
            apiUrl: 'http://localhost:3000',
            baseUrl: 'http://localhost:3000' 
        };
    </script>

    <!-- Widget Script -->
    <script src="./solidarity-request-form.js"></script>

    <script>
        let widget;

        function initMock() {
            widget = new SolidarityRequestForm('pata-solidarity-form', { 
                useMock: true,
                apiUrl: 'http://localhost:3000',
                baseUrl: 'http://localhost:3000'
            });
        }

        function showSuccess() {
            if (widget) {
                widget.state.success = true;
                widget.render();
            } else {
                alert('Primero inicializa el widget con Mock Data');
            }
        }

        // Auto-init for convenience
        window.onload = initMock;
    </script>
</body>
</html>
