<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Detalle de Solicitud Fondo Solidario</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Fraiche';
            src: url('https://app.pataamiga.mx/fonts/fraiche/fraiche-regular.otf') format('opentype');
            font-weight: normal;
        }
        * { box-sizing: border-box; }
        body {
            background-color: #FFFCE7;
            margin: 0;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }
        .preview-header {
            background: #181C1C;
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .preview-header h1 { font-family: 'Fraiche', sans-serif; font-size: 20px; margin: 0; }
        
        #pata-solidarity-detail {
            max-width: 800px;
            margin: 0 auto;
        }

        .debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #181C1C;
            z-index: 10000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .debug-panel h4 { margin: 0 0 10px 0; font-family: 'Fraiche', sans-serif; }
        .debug-btn {
            background: #FE8F15;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="preview-header">
        <h1>MODO PREVIEW: DETALLE DE SOLICITUD</h1>
        <div style="font-size: 12px; opacity: 0.7;">Club Pata Amiga</div>
    </div>

    <div id="pata-solidarity-detail"></div>

    <div class="debug-panel">
        <h4>Simular Estados</h4>
        <button class="debug-btn" onclick="updateMockStatus('new')">Recibida</button>
        <button class="debug-btn" onclick="updateMockStatus('in_review')">En Revisión</button>
        <button class="debug-btn" onclick="updateMockStatus('needs_info')">Requiere Info</button>
        <button class="debug-btn" onclick="updateMockStatus('approved')">Aprobada</button>
        <button class="debug-btn" onclick="updateMockStatus('rejected')">Rechazada</button>
    </div>

    <!-- Configuration -->
    <script>
        window.PATA_AMIGA_CONFIG = {
            apiUrl: 'http://localhost:3000',
            baseUrl: 'https://app.pataamiga.mx'
        };
    </script>

    <!-- Mock Memberstack -->
    <script>
        window.$memberstackDom = {
            getCurrentMember: async () => ({
                data: {
                    id: 'mock-user',
                    first_name: 'Jorge',
                    last_name: 'Cerna'
                }
            })
        };
    </script>

    <!-- Widget Script -->
    <script src="solidarity-request-detail.js"></script>

    <script>
        function updateMockStatus(status) {
            if (window.PataSolidarityDetail) {
                window.PataSolidarityDetail.state.request.status = status;
                window.PataSolidarityDetail.render();
                window.PataSolidarityDetail.attachEventListeners();
            }
        }

        // Force mock mode
        window.addEventListener('DOMContentLoaded', () => {
            const checkInit = setInterval(() => {
                if (window.PataSolidarityDetail) {
                    clearInterval(checkInit);
                    window.PataSolidarityDetail.useMock = true;
                    window.PataSolidarityDetail.init();
                }
            }, 100);
        });
    </script>
</body>
</html>
