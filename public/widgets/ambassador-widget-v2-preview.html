<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview · Dashboard de embajadores V2</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f8f5ef}body{font-family:Outfit,Arial,sans-serif}.preview-note{position:fixed;z-index:10000;right:16px;bottom:16px;padding:8px 12px;border:1px solid #ded7ca;border-radius:999px;background:#fff;color:#235b57;font-size:12px;box-shadow:0 8px 24px rgba(35,91,87,.12)}
  </style>
</head>
<body>
  <div id="ambassador-widget"></div>
  <div class="preview-note">Preview local · datos simulados</div>
  <script>
    const mockAmbassador = {
      id:'preview-amb-1',status:'approved',welcome_shown:true,first_name:'Jorge',paternal_surname:'Cerna',
      email:'jorge@pataamiga.mx',phone:'442 123 4567',city:'Querétaro',rfc:'CEAJ900101ABC',
      instagram:'@pataamiga',bank_name:'BBVA',clabe:'012345678901234567',referral_code:'PATAMIGA-EQUIPO',
      referral_code_status:'active',active_referrals_count:12,total_referrals:18,approved_referrals:12,review_referrals:3,
      month_earnings:1240,pending_payout:1240,total_earnings:8650,
      recent_referrals:[
        {masked_name:'M***** L*****',plan:'Plan anual',commission_amount:169,commission_status:'approved',created_at:'2026-07-16'},
        {masked_name:'C***** R*****',plan:'Plan anual',commission_amount:169,commission_status:'pending',created_at:'2026-07-15'},
        {masked_name:'A***** T*****',plan:'Plan mensual',commission_amount:49,commission_status:'paid',created_at:'2026-07-12'}
      ]
    };
    window.$memberstackDom={getCurrentMember:async()=>({data:{id:'mem-preview-1',auth:{email:'jorge@pataamiga.mx'},planConnections:[]}}),getMemberCookie:()=> 'preview-memberstack-jwt'};
    const nativeFetch=window.fetch.bind(window);
    window.fetch=async(input,options={})=>{
      const url=String(input);
      if(url.includes('/api/ambassadors/dashboard'))return new Response(JSON.stringify({success:true,data:mockAmbassador}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/api/ambassador-materials'))return new Response(JSON.stringify({success:true,materials:[
        {id:'m1',title:'Historia para Instagram',description:'Formato vertical listo para publicar',file_type:'image',file_url:'/widgets/home%20v2%20images/logo-light-bg.svg'},
        {id:'m2',title:'Guía del programa',description:'Información para nuevos referidos',file_type:'pdf',file_url:'#'}
      ]}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/request-code-change'))return new Response(JSON.stringify({success:true,status:'pending_admin'}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/generate-code-link'))return new Response(JSON.stringify({success:true,data:{selection_url:'#codigo-preview'}}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/resend-code-email'))return new Response(JSON.stringify({success:true,status:'email_sent'}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/cancel'))return new Response(JSON.stringify({success:true}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/payouts'))return new Response(JSON.stringify({success:true,data:[]}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/api/upload/ambassador-photo'))return new Response(JSON.stringify({success:true,url:'/widgets/logo-light-bg.svg'}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/messages?unreadOnly=true'))return new Response(JSON.stringify({count:2}),{status:200,headers:{'Content-Type':'application/json'}});
      if(url.includes('/messages'))return new Response(JSON.stringify([]),{status:200,headers:{'Content-Type':'application/json'}});
      return nativeFetch(input,options);
    };
  </script>
  <script src="/widgets/ambassador-widget.js?v=amb-v2-1"></script>
</body>
</html>
