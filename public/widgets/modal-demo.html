<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pata Amiga Widget Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #00BBB4;
            --color-secondary: #FE8F15;
        }
        body { font-family: 'Outfit', sans-serif; background: #333; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .demo-controls { position: fixed; top: 20px; left: 20px; z-index: 10000; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: var(--color-primary); color: white; cursor: pointer; font-weight: bold; }

        .material-symbols-outlined { text-transform: none !important; }

        /* WIDGET STYLES (SIMULATED) */
        #pataPetModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
        .pata-modal-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .pata-modal-box {
            background: white; width: 900px; max-width: 95%; max-height: 90vh;
            border-radius: 40px; position: relative; display: flex; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .pata-modal-gallery { width: 380px; background: #F8FAFC; padding: 32px; border-right: 1px solid #F1F5F9; display: flex; flex-direction: column; gap: 24px; }
        .pata-gallery-main { width: 100%; height: 320px; border-radius: 30px; background: #E2E8F0; overflow: hidden; }
        .pata-gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .pata-modal-upload-box { aspect-ratio: 1; border: 2px dashed #CBD5E1; border-radius: 16px; background: white; }

        .pata-modal-info { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 32px; }
        .pata-pet-name { font-size: 48px; color: var(--color-primary); margin: 0; font-family: 'Fraiche', sans-serif; }
        .pata-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .pata-info-item { display: flex; align-items: center; gap: 16px; }
        .pata-info-icon-wrap { width: 48px; height: 48px; border-radius: 14px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; color: var(--color-primary); }
        
        .pata-close-modal {
            position: absolute; top: 24px; right: 24px; width: 44px; height: 44px;
            border-radius: 50%; border: none; background: #F1F5F9; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        /* MOBILE OVERHAUL */
        @media (max-width: 768px) {
            .pata-modal-overlay { padding: 0; align-items: flex-end; }
            .pata-modal-box {
                flex-direction: column !important;
                width: 100% !important;
                max-width: 100% !important;
                height: 92vh !important;
                max-height: 92vh !important;
                margin: 0 !important;
                border-radius: 30px 30px 0 0 !important;
                overflow-y: auto !important;
                background: #fff !important;
            }

            .pata-modal-main {
                display: flex !important;
                flex-direction: column !important;
                height: auto !important;
                width: 100% !important;
            }

            .pata-modal-gallery {
                width: 100% !important;
                min-height: auto !important;
                padding: 16px 20px 8px 20px !important;
                border-right: none !important;
                border-bottom: 1px solid rgba(0,0,0,0.05);
                flex: 0 0 auto !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 8px !important;
                box-sizing: border-box !important;
            }

            .pata-gallery-main {
                width: 100% !important;
                height: 140px !important;
                margin: 0 !important;
                border-radius: 20px !important;
            }

            .pata-gallery-grid { 
                display: flex !important;
                flex-direction: row !important;
                overflow-x: auto !important;
                gap: 10px !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 4px 0 8px 0 !important;
            }

            .pata-modal-info {
                width: 100% !important;
                padding: 12px 20px 40px 20px !important;
                overflow-y: visible !important;
                flex: 1 1 auto !important;
                display: flex !important;
                flex-direction: column !important;
                gap: 16px !important;
                box-sizing: border-box !important;
            }
            .pata-pet-name { font-size: 32px !important; margin-bottom: 2px !important; }
        }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button onclick="toggleDevice('desktop')">Desktop</button>
        <button onclick="toggleDevice('mobile')">Mobile (375px)</button>
    </div>

    <div id="demo-container" style="width: 100%; height: 100%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;">
        <div id="pataPetModal">
            <div class="pata-modal-overlay">
                <div class="pata-modal-box">
                    <button class="pata-close-modal"><span class="material-symbols-outlined">close</span></button>
                    <div class="pata-modal-gallery">
                        <div class="pata-gallery-main" style="background:#7DD8D5; display:flex; align-items:center; justify-content:center; color:white;">[FOTO]</div>
                        <div class="pata-gallery-grid">
                            <div class="pata-modal-upload-box"></div>
                            <div class="pata-modal-upload-box"></div>
                            <div class="pata-modal-upload-box"></div>
                            <div class="pata-modal-upload-box"></div>
                        </div>
                    </div>
                    <div class="pata-modal-info">
                        <h2 class="pata-pet-name">Pancha</h2>
                        <div class="pata-info-grid">
                            <div class="pata-info-item"><div class="pata-info-icon-wrap"><span class="material-symbols-outlined">pets</span></div><div><span>Especie</span><br><b>Perro</b></div></div>
                            <div class="pata-info-item"><div class="pata-info-icon-wrap"><span class="material-symbols-outlined">calendar_today</span></div><div><span>Edad</span><br><b>10 años</b></div></div>
                            <div class="pata-info-item"><div class="pata-info-icon-wrap"><span class="material-symbols-outlined">female</span></div><div><span>Género</span><br><b>Hembra</b></div></div>
                            <div class="pata-info-item"><div class="pata-info-icon-wrap"><span class="material-symbols-outlined">palette</span></div><div><span>Color</span><br><b>Negro</b></div></div>
                        </div>
                        <div style="background:#FFFBEB; padding:20px; border-radius:20px; margin-top:20px;">
                            <b>¡CASI LISTO!</b><br>Sube tus documentos faltantes.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDevice(type) {
            const container = document.getElementById('demo-container');
            if (type === 'mobile') {
                container.style.width = '375px';
                container.style.height = '812px';
                container.style.border = '10px solid black';
                container.style.borderRadius = '30px';
                container.style.margin = 'auto';
            } else {
                container.style.width = '100%';
                container.style.height = '100%';
                container.style.border = 'none';
                container.style.borderRadius = '0';
            }
        }
    </script>
</body>
</html>
