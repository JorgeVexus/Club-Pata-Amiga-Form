<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Test - Solidarity Fund Dashboard</title>
    <style>
        body { margin: 0; background: #f0f2f5; padding: 20px; font-family: 'Outfit', sans-serif; }
        .dev-header {
            background: #2D3748; color: white; padding: 20px;
            border-radius: 20px; margin-bottom: 30px; text-align: center;
            border: 2px solid #000; box-shadow: 4px 4px 0px #000;
        }
        .container { max-width: 1300px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="dev-header">
            <h1 style="margin: 0; font-size: 24px;">🛠️ Modo de Prueba: Dashboard Apoyo Económico</h1>
            <p style="margin: 10px 0 0; opacity: 0.8; font-size: 14px;">Visualización del diseño con datos ficticios sin requerir sesión.</p>
        </div>

        <div id="solidarity-dashboard-root"></div>
    </div>

    <!-- Script del Widget -->
    <script src="./solidarity-dashboard.js"></script>

    <script>
        // Inicializar con Mock Mode activo
        document.addEventListener('DOMContentLoaded', () => {
            const dashboard = new SolidarityDashboard('solidarity-dashboard-root', {
                useMock: true
            });
            window.pataDashboard = dashboard;
        });
    </script>
</body>
</html>
