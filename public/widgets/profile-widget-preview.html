<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Preview - User Profile Widget</title>
    <style>
        body { background: #f7f4ee; color:#174f4c; margin: 0; padding: 32px 20px 64px; min-height:100dvh; font-family: 'Outfit', sans-serif; }
        .dev-bar { background: rgba(255,255,255,.88); border-radius: 18px; padding: 14px 18px; margin: 0 auto 24px; max-width: 1000px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border: 1px solid #e8e0d4; box-shadow:0 8px 24px rgba(24,75,71,.06); }
        .dev-bar h3 { margin: 0 8px 0 0; font-size: 15px; color: #174f4c; }
        .dev-btn { padding: 8px 14px; border: 1px solid #ded5c8; border-radius: 999px; background: #fff; color:#315c59; cursor: pointer; font-weight: 700; font-size: 12px; font-family: inherit; transition: transform .2s ease, background .2s ease; }
        .dev-btn:hover { background: #e7f6f4; transform: translateY(-1px); }
        .dev-btn.green,.dev-btn.teal,.dev-btn.orange { background: #1fbdb3; border-color:#1fbdb3; color: #fff; }
        #pata-profile { max-width: 1040px; margin: 0 auto; }
        @media(max-width:640px) { body { padding:16px 12px 42px; } .dev-bar span { display:none; } }
    </style>
</head>
<body>
    <div class="dev-bar">
        <h3>🛠️ Dev Preview — Perfil de Usuario</h3>
        <button class="dev-btn green" onclick="mockRole('member')">👤 Miembro</button>
        <button class="dev-btn teal" onclick="mockRole('ambassador')">⭐ Embajador</button>
        <button class="dev-btn orange" onclick="mockRole('wellness_center')">🩺 Centro Wellness</button>
        <button class="dev-btn" onclick="location.reload()" style="background:#ddd;">🔄 Reset</button>
        <span style="margin-left:auto; font-size:12px; color:#666;">API: <code id="api-url">http://localhost:3000</code></span>
    </div>

    <div id="pata-profile"></div>

    <script>
        window.PATA_AMIGA_CONFIG = { apiUrl: 'http://localhost:3000' };

        // Mock Memberstack con datos de prueba
        window.$memberstackDom = {
            getCurrentMember: async () => ({
                data: {
                    id: 'mem_dev_profile_001',
                    auth: { email: 'azalia@pataamiga.mx' },
                    customFields: { 'approval-status': 'approved' },
                    planConnections: [{
                        planId: 'pln_monthly',
                        active: true,
                        payment: { amount: 15900, currency: 'mxn' }
                    }]
                }
            }),
            getMemberCookie: async () => 'preview-member-token',
            launchStripeCustomerPortal: async () => {
                alert('🔗 [MOCK] Abriendo Customer Portal de Stripe...\n\nEn producción esto redirige a stripe.com/billing/portal');
            },
            logout: async () => { alert('[MOCK] Cerrando sesión...'); }
        };

        // Mock APIs del backend
        const origFetch = window.fetch;
        window.fetch = function(url, opts) {
            const u = url.toString();

            if (u.includes('/api/user/profile')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({
                    success: true,
                    user: {
                        memberstack_id: 'mem_dev_profile_001',
                        first_name: 'Azalia',
                        paternal_last_name: 'Peña',
                        maternal_last_name: 'García',
                        email: 'azalia@pataamiga.mx',
                        phone: '+52 55 4123 4567',
                        street: 'Av. Paseo de los Peludos',
                        ext_number: '328',
                        int_number: '',
                        colony: 'Colonia Patitas Felices',
                        city: 'Guadalajara',
                        state: 'Jalisco',
                        postal_code: '44190',
                        birth_date: '1999-02-14',
                        profile_photo_url: null,
                        approval_status: 'approved',
                        registration_date: '2025-01-15T10:00:00Z',
                        plan_name: 'Plan mensual',
                        plan_type: 'monthly',
                        next_payment_date: '2026-12-01T00:00:00Z',
                        ambassador_code: null
                    }
                })});
            }

            if (u.includes('/api/user/payment-method')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({
                    success: true,
                    paymentMethod: {
                        brand: 'mastercard',
                        last4: '8832',
                        expMonth: 11,
                        expYear: 2027,
                        funding: 'debit'
                    }
                })});
            }

            if (u.includes('/api/user/pets')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({
                    success: true,
                    pets: [
                        {
                            id: 'pet_spike_001',
                            name: 'Spike',
                            type: 'perro',
                            breed: 'Schnauzer',
                            age_value: '3',
                            age_unit: 'years',
                            gender: 'macho',
                            status: 'approved',
                            primary_photo_url: 'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=300',
                            waiting_period_end: '2025-06-01T00:00:00Z',
                            is_active: true
                        },
                        {
                            id: 'pet_mila_002',
                            name: 'Mila',
                            type: 'gato',
                            breed: 'Doméstico',
                            age_value: '2',
                            age_unit: 'years',
                            gender: 'hembra',
                            status: 'pending',
                            primary_photo_url: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=300',
                            waiting_period_end: '2025-09-01T00:00:00Z',
                            is_active: true
                        }
                    ]
                })});
            }

            if (u.includes('/api/ambassadors/profile')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({
                    success: true,
                    ambassador: {
                        referral_code: 'AZALIA2025',
                        status: 'active',
                        total_referrals: 7,
                        active_referrals: 5,
                        joined_at: '2025-03-01T00:00:00Z'
                    }
                })});
            }

            if (u.includes('/api/wellness/me')) {
                if (window.__currentDevRole === 'wellness_center') {
                    return Promise.resolve({ ok: true, json: () => Promise.resolve({
                        success: true,
                        data: {
                            id: 'well_dev_001',
                            memberstack_id: 'mem_dev_profile_001',
                            name: 'Clínica Veterinaria Pata Amiga',
                            establishment_name: 'Veterinaria Central Pata Amiga',
                            email: 'contacto@vets.pataamiga.mx',
                            phone: '5512345678',
                            address: 'Av. Revolución 100, Col. Centro, CP 01000, CDMX',
                            logo_url: 'https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=150',
                            status: 'approved',
                            created_at: '2025-02-10T12:00:00Z',
                            services: ['Consulta General', 'Vacunas', 'Desparasitación', 'Cirugía'],
                            locations: [
                                { name: 'Sucursal Sur', address: 'Av. Insurgentes Sur 1500, CDMX', phone: '5577665544', is_primary: true },
                                { name: 'Sucursal Norte', address: 'Calzada de Tlalpan 3200, CDMX', phone: '5599887766', is_primary: false }
                            ]
                        }
                    })});
                }
                return Promise.resolve({ ok: true, status: 404, json: () => Promise.resolve({ success: false, error: 'No encontrado' }) });
            }

            if (u.includes('/api/wellness/update')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({ success: true, message: 'Perfil de centro actualizado' }) });
            }

            if (u.includes('/api/upload/wellness-logo')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({ success: true, url: 'https://via.placeholder.com/150' }) });
            }

            if (u.includes('/api/user/update-profile')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({ success: true, message: 'Perfil actualizado' }) });
            }

            if (u.includes('/api/upload/profile-photo')) {
                return Promise.resolve({ ok: true, json: () => Promise.resolve({ success: true, url: 'https://via.placeholder.com/150' }) });
            }

            return origFetch.apply(this, arguments);
        };

        function mockRole(role) {
            window.__currentDevRole = role;
            if (window.PataProfileWidget) {
                window.PataProfileWidget.devSetRole(role);
            }
        }
    </script>

    <script src="/widgets/user-profile-widget.js"></script>
</body>
</html>
