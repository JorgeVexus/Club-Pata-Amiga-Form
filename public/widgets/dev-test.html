<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Test - Unified Membership Widget</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dev-controls {
            background: #fff;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
            border: 2px solid #eee;
        }
        h1 { color: #00BBB4; font-size: 24px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .info { font-size: 14px; color: #666; margin-bottom: 15px; }
        
        .debug-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .debug-btn {
            padding: 12px;
            border: 2px solid #000;
            border-radius: 12px;
            background: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        
        .debug-btn:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 #000; }
        .debug-btn:active { transform: translateY(0); box-shadow: 0 0 0 #000; }
        
        .btn-approved { border-color: #4CAF50; color: #2E7D32; }
        .btn-rejected { border-color: #F44336; color: #C62828; }
        .btn-pending { border-color: #FF9800; color: #E65100; }
        .btn-action { border-color: #2196F3; color: #1565C0; }
        .btn-appealed { border-color: #9C27B0; color: #7B1FA2; }
        .btn-reset { border-color: #333; background: #333; color: #fff; }

        .pata-amiga-container {
            width: 100%;
            max-width: 1400px;
        }
    </style>
</head>
<body>

    <div class="dev-controls">
        <h1>🛠️ Panel de Control de Estados</h1>
        <p class="info">Usa estos botones para forzar el widget a diferentes estados y probar el diseño rápidamente.</p>
        
        <div class="debug-buttons">
            <button class="debug-btn btn-approved" onclick="changeStatus('approved')">✅ Aprobado</button>
            <button class="debug-btn btn-rejected" onclick="changeStatus('rejected')">❌ Rechazado</button>
            <button class="debug-btn btn-pending" onclick="changeStatus('pending')">⏳ En Revisión</button>
            <button class="debug-btn btn-pending" onclick="changeStatus('pending_payment')" style="border-color: #FE8F15;">💳 Pago Pendiente</button>
            <button class="debug-btn btn-pending" onclick="changeStatus('payment_processing')" style="border-color: #CAF5F2;">⏳ Pago en Proceso</button>
            <button class="debug-btn btn-action" onclick="changeStatus('action_required')">⚠️ Acción Requerida</button>
            <button class="debug-btn btn-appealed" onclick="changeStatus('appealed')">⚖️ Apelado</button>
            <button class="debug-btn btn-reset" onclick="location.reload()">🔄 Reset</button>
        </div>
    </div>

    <!-- El contenedor donde se renderizará el widget -->
    <div class="pata-amiga-container">
        <div id="pata-amiga-membership-widget"></div>
    </div>

    <script>
        // 1. Configuración Global
        window.PATA_AMIGA_CONFIG = {
            apiUrl: 'http://localhost:3000'
        };

        // 2. Mock de Memberstack
        window.$memberstackDom = {
            getCurrentMember: async function() {
                return {
                    data: {
                        id: "mem_dev_test_user",
                        auth: { email: "dev-tester@pataamiga.mx" },
                        customFields: { "approval-status": "approved" }
                    }
                };
            }
        };

        // 3. Función para cambiar estados dinámicamente
        function changeStatus(status) {
            if (!window.pataWidget) {
                alert("Widget no cargado aún");
                return;
            }
            
            console.log(`切换状态到: ${status}`);
            
            // Forzamos el estado en el objeto interno del widget
            window.pataWidget.membershipStatus = status;
            
            // Si hay mascotas, también les cambiamos el estado para ver el detalle
            if (window.pataWidget.pets && window.pataWidget.pets.length > 0) {
                window.pataWidget.pets.forEach(pet => {
                    pet.status = status;
                    // Si es rechazado, añadimos un motivo de ejemplo
                    if (status === 'rejected') {
                        pet.rejection_reason = "El documento INE no es legible o está expirado. Por favor sube una foto más clara.";
                    }
                    // Si es acción requerida, añadimos un mensaje de admin
                    if (status === 'action_required') {
                        pet.admin_message = "Necesitamos una foto donde se vea mejor la cara de tu mascota.";
                    }
                });
            } else {
                // Si no hay mascotas (mock vacío), creamos una de prueba
                window.pataWidget.pets = [{
                    id: "pet_1",
                    name: "Rex (Prueba)",
                    type: "dog",
                    status: status,
                    rejection_reason: status === 'rejected' ? "Motivo de prueba de rechazo" : "",
                    photo_url: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=200",
                    waiting_period_days: 90,
                    days_passed: 45
                }];
            }
            
            window.pataWidget.render();
            
            // Feedback visual en consola
            console.log(`✅ Widget forzado a estado: ${status.toUpperCase()}`);
        }
    </script>

    <!-- 4. Cargar el script local -->
    <script src="/widgets/unified-membership-widget.js"></script>

</body>
</html>
