<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Campaign Gift Widget (Regalo)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #1cbcad; /* bg-teal original */
            min-height: 100vh;
        }
        .preview-header { 
            background: #153a38; 
            color: white; 
            padding: 12px 20px; 
            font-family: monospace;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.15);
        }
        .preview-badge {
            background: #f7941d;
            color: white;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="preview-header">
        <span>🔧 Campaign Gift Widget Preview Mode | URL: /widgets/campaign-gift-preview.html</span>
        <span class="preview-badge">CAMPAIGN: REGALO</span>
    </div>

    <!-- Contenedor donde se inyectará el Widget -->
    <div id="pata-campaign-gift-widget"></div>

    <!-- Script de Configuración local para redirigir a Next.js corriendo en el puerto 3000 -->
    <script>
        window.PATA_AMIGA_CONFIG = {
            apiUrl: window.location.origin, // Usa el origin actual (útil si corre en localhost:3000)
            campaign: 'regalo'
        };
    </script>

    <!-- Inyección del script autoejecutable del widget -->
    <script src="./campaign-gift-widget.js"></script>
</body>
</html>
